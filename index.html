    { type: 'sine', f: 69, cut: 300, lvl: 0.4 },
    { type: 'sine', f: 1318.5, cut: 4000, lvl: 0.02 },
  ],
  signal: 0, particles: [], lid: 0, lidTarget: 0, blinkTimer: 3, scatter: 0,
  watchTime: 0, extraEyes: [],

  resize() {
    this.particles = [];
    const count = 1300;
    for (let i = 0; i < count; i++) {
      this.particles.push({
        ang: Math.random() * TAU,
        rad: Math.pow(Math.random(), 0.7),
        x: Math.random() * W, y: Math.random() * H,
        vx: 0, vy: 0,
      });
    }
    this.fibers = [];
    for (let i = 0; i < 160; i++) {
      this.fibers.push({
        ang: (i / 160) * TAU + rand(-0.02, 0.02),
        hueJ: rand(-16, 22),
        inJ: rand(0, 0.16),
        outJ: rand(0.82, 1.0),
        alpha: rand(0.25, 0.7),
        width: rand(0.8, 2.2),
      });
    }
    this.veins = [];
    for (let i = 0; i < 9; i++) {
      const startAng = rand(0, TAU);
      const pts = [];
      let ang = startAng, radK = rand(1.55, 1.85);
      for (let s = 0; s < 7; s++) {
        pts.push({ ang, radK });
        ang += rand(-0.16, 0.16);
        radK -= rand(0.06, 0.12);
      }
      this.veins.push(pts);
    }
    this.extraEyes = [
      { fx: 0.12, fy: 0.18, r: 26, opensAt: 25, lid: 1, blinkT: rand(2, 5) },
      { fx: 0.88, fy: 0.2, r: 20, opensAt: 60, lid: 1, blinkT: rand(2, 5) },
      { fx: 0.85, fy: 0.78, r: 16, opensAt: 110, lid: 1, blinkT: rand(2, 5) },
    ];
  },

  onClick() { this.lidTarget = 1; this.blinkTimer = 0.22; blip(160, 0.25, 'sine', 0.08, 60); },

  update(dt) {
    const cx = W / 2, cy = H / 2;
    const eyeRadius = Math.min(W, H) * 0.24;

    if (this.signal > 0.6) this.watchTime += dt;

    this.blinkTimer -= dt;
    if (this.blinkTimer <= 0) {
      if (this.lidTarget === 0) { this.lidTarget = 1; this.blinkTimer = 0.18; }
      else { this.lidTarget = 0; this.blinkTimer = rand(2.5, 6.5); }
    }
    this.lid = lerp(this.lid, this.lidTarget, Math.min(1, dt * 14));

    if (mouse.speed > 1600 && this.scatter <= 0) {
      this.scatter = 0.9;
      for (const p of this.particles) {
        p.vx += rand(-700, 700);
        p.vy += rand(-700, 700);
      }
    }
    if (this.scatter > 0) this.scatter -= dt;

    for (const ex of this.extraEyes) {
      if (this.watchTime > ex.opensAt) {
        ex.blinkT -= dt;
        if (ex.blinkT <= 0) { ex.lid = 1; ex.blinkT = rand(3, 8); }
        ex.lid = Math.max(0, ex.lid - dt * 4);
        if (!ex.announced && this.signal > 0.6) { ex.announced = true; toast('ANOTHER ONE OPENED'); }
      }
    }

    const toMouseX = mouse.x - cx, toMouseY = mouse.y - cy;
    const mouseDist = Math.hypot(toMouseX, toMouseY) + 0.001;
    const lookMag = Math.min(mouseDist, eyeRadius * 0.32);
    const lookX = (toMouseX / mouseDist) * lookMag;
    const lookY = (toMouseY / mouseDist) * lookMag;
    const proximity = clamp(1 - mouseDist / (eyeRadius * 2.5), 0, 1);
    const pupilRadius = eyeRadius * (0.26 + proximity * 0.22);
    const springK = this.scatter > 0 ? 4 : 26;

    for (const p of this.particles) {
      const wobble = Math.sin(timeNow * 0.8 + p.ang * 3) * eyeRadius * 0.02;
      const r = pupilRadius + p.rad * (eyeRadius - pupilRadius) + wobble;
      const hx = cx + lookX + Math.cos(p.ang) * r;
      let hy = cy + lookY + Math.sin(p.ang) * r;
      hy = cy + lookY + (hy - cy - lookY) * (1 - this.lid * 0.96) * 0.78;
      p.vx += (hx - p.x) * springK * dt;
      p.vy += (hy - p.y) * springK * dt;
      p.vx *= Math.pow(0.012, dt);
      p.vy *= Math.pow(0.012, dt);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.ang += dt * 0.05 * (p.rad > 0.5 ? 1 : -1.4);
    }
  },

  drawSmallEye(ex, a) {
    const x = ex.fx * W, y = ex.fy * H;
    const open = 1 - ex.lid;
    if (open < 0.02) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, 0.6 * open);
    ctx.fillStyle = 'rgba(30,6,8,' + (0.9 * a) + ')';
    ctx.beginPath();
    ctx.arc(0, 0, ex.r, 0, TAU);
    ctx.fill();
    const dx = mouse.x - x, dy = mouse.y - y;
    const d = Math.hypot(dx, dy) + 0.001;
    const m = Math.min(d, ex.r * 0.4);
    ctx.fillStyle = 'rgba(255,120,60,' + (0.8 * a) + ')';
    ctx.beginPath();
    ctx.arc(dx / d * m, dy / d * m, ex.r * 0.42, 0, TAU);
    ctx.fill();
    ctx.fillStyle = 'rgba(120,10,10,' + (0.95 * a) + ')';
    ctx.beginPath();
    ctx.arc(dx / d * m, dy / d * m, ex.r * 0.2, 0, TAU);
    ctx.fill();
    ctx.restore();
  },

  draw(a) {
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H) * 0.24;
    const toMouseX = mouse.x - cx, toMouseY = mouse.y - cy;
    const mouseDist = Math.hypot(toMouseX, toMouseY) + 0.001;
    const lookMag = Math.min(mouseDist, R * 0.32);
    const lookX = (toMouseX / mouseDist) * lookMag;
    const lookY = (toMouseY / mouseDist) * lookMag;
    const proximity = clamp(1 - mouseDist / (R * 2.5), 0, 1);
    const pupilR = R * (0.26 + proximity * 0.22);
    const ix = cx + lookX, iy = cy + lookY;

    ctx.save();
    ctx.globalAlpha = a;

    const bg = ctx.createRadialGradient(cx, cy, R * 0.2, cx, cy, Math.max(W, H) * 0.7);
    bg.addColorStop(0, 'rgba(38,5,9,' + (0.9 * a) + ')');
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // sclera
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(1.85, 1.12);
    const sclera = ctx.createRadialGradient(0, 0, 0, 0, 0, R);
    sclera.addColorStop(0, 'rgba(126,108,104,' + (0.95 * a) + ')');
    sclera.addColorStop(0.72, 'rgba(96,72,70,' + (0.92 * a) + ')');
    sclera.addColorStop(1, 'rgba(46,18,20,' + (0.85 * a) + ')');
    ctx.fillStyle = sclera;
    ctx.beginPath();
    ctx.arc(0, 0, R, 0, TAU);
    ctx.fill();
    ctx.restore();

    // veins crawling in from the edges
    ctx.lineWidth = 1.3;
    for (const vein of this.veins) {
      ctx.strokeStyle = 'rgba(168,42,40,' + ((0.22 + proximity * 0.25) * a) + ')';
      ctx.beginPath();
      for (let s = 0; s < vein.length; s++) {
        const pt = vein[s];
        const vx = cx + Math.cos(pt.ang) * R * pt.radK * 1.5;
        const vy = cy + Math.sin(pt.ang) * R * pt.radK * 0.78;
        if (s === 0) ctx.moveTo(vx, vy); else ctx.lineTo(vx, vy);
      }
      ctx.stroke();
    }

    // iris base
    const irisGrad = ctx.createRadialGradient(ix, iy, pupilR * 0.6, ix, iy, R);
    irisGrad.addColorStop(0, 'rgba(150,86,20,' + (0.95 * a) + ')');
    irisGrad.addColorStop(0.55, 'rgba(108,72,22,' + (0.95 * a) + ')');
    irisGrad.addColorStop(0.85, 'rgba(52,60,34,' + (0.95 * a) + ')');
    irisGrad.addColorStop(1, 'rgba(16,14,10,' + (0.98 * a) + ')');
    ctx.fillStyle = irisGrad;
    ctx.beginPath();
    ctx.arc(ix, iy, R, 0, TAU);
    ctx.fill();

    // iris fibers, slowly rotating
    ctx.save();
    ctx.translate(ix, iy);
    const spin = timeNow * 0.03;
    for (const f of this.fibers) {
      const ang = f.ang + spin;
      const r0 = pupilR * (1 + f.inJ);
      const r1 = pupilR + (R - pupilR) * f.outJ;
      const hue = 32 + f.hueJ + Math.sin(ang * 3) * 10;
      ctx.strokeStyle = 'hsla(' + hue.toFixed(0) + ',72%,' + (46 + f.hueJ).toFixed(0) + '%,' + (f.alpha * a).toFixed(3) + ')';
      ctx.lineWidth = f.width;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang) * r0, Math.sin(ang) * r0);
      ctx.lineTo(Math.cos(ang + 0.05) * r1, Math.sin(ang + 0.05) * r1);
      ctx.stroke();
    }
    ctx.restore();

    // particle shimmer living inside the iris
    ctx.globalCompositeOperation = 'lighter';
    for (const p of this.particles) {
      const hue = 26 + Math.sin(p.ang * 5) * 14 + p.rad * 30;
      ctx.fillStyle = 'hsla(' + hue.toFixed(0) + ',85%,58%,' + (0.28 * a).toFixed(3) + ')';
      ctx.fillRect(p.x, p.y, 2, 2);
    }
    ctx.globalCompositeOperation = 'source-over';

    // limbal ring
    ctx.strokeStyle = 'rgba(8,6,4,' + (0.85 * a) + ')';
    ctx.lineWidth = R * 0.05;
    ctx.beginPath();
    ctx.arc(ix, iy, R * 0.97, 0, TAU);
    ctx.stroke();

    // pupil with soft edge and an ember deep inside
    const pupilGrad = ctx.createRadialGradient(ix, iy, 0, ix, iy, pupilR);
    pupilGrad.addColorStop(0, 'rgba(0,0,0,1)');
    pupilGrad.addColorStop(0.7, 'rgba(0,0,0,1)');
    pupilGrad.addColorStop(1, 'rgba(20,8,4,' + (0.9 * a) + ')');
    ctx.fillStyle = pupilGrad;
    ctx.beginPath();
    ctx.arc(ix, iy, pupilR, 0, TAU);
    ctx.fill();
    const ember = ctx.createRadialGradient(ix, iy, 0, ix, iy, pupilR * 0.55);
    ember.addColorStop(0, 'rgba(255,40,24,' + ((0.16 + proximity * 0.30) * (1 - this.lid) * a) + ')');
    ember.addColorStop(1, 'rgba(255,40,24,0)');
    ctx.fillStyle = ember;
    ctx.beginPath();
    ctx.arc(ix, iy, pupilR * 0.55, 0, TAU);
    ctx.fill();

    // specular glints
    ctx.fillStyle = 'rgba(255,252,244,' + (0.85 * (1 - this.lid) * a) + ')';
    ctx.beginPath();
    ctx.arc(ix - pupilR * 0.45, iy - pupilR * 0.5, R * 0.045, 0, TAU);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,252,244,' + (0.4 * (1 - this.lid) * a) + ')';
    ctx.beginPath();
    ctx.arc(ix + pupilR * 0.55, iy + pupilR * 0.42, R * 0.022, 0, TAU);
    ctx.fill();

    // eyelids
    const aperture = R * 1.06 * (1 - this.lid * 0.97);
    const lidColor = 'rgba(7,3,5,' + (0.99 * a) + ')';
    ctx.fillStyle = lidColor;
    ctx.beginPath();
    ctx.moveTo(cx - R * 2.1, cy - R * 1.5);
    ctx.lineTo(cx - R * 2.1, cy - aperture * 0.45);
    ctx.quadraticCurveTo(cx, cy - aperture, cx + R * 2.1, cy - aperture * 0.45);
    ctx.lineTo(cx + R * 2.1, cy - R * 1.5);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx - R * 2.1, cy + R * 1.5);
    ctx.lineTo(cx - R * 2.1, cy + aperture * 0.45);
    ctx.quadraticCurveTo(cx, cy + aperture, cx + R * 2.1, cy + aperture * 0.45);
    ctx.lineTo(cx + R * 2.1, cy + R * 1.5);
    ctx.closePath();
    ctx.fill();
    // lash lines along the lid edges
    ctx.strokeStyle = 'rgba(120,60,52,' + (0.5 * a) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - R * 1.6, cy - aperture * 0.42);
    ctx.quadraticCurveTo(cx, cy - aperture * 0.97, cx + R * 1.6, cy - aperture * 0.42);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - R * 1.6, cy + aperture * 0.42);
    ctx.quadraticCurveTo(cx, cy + aperture * 0.97, cx + R * 1.6, cy + aperture * 0.42);
    ctx.stroke();

    for (const ex of this.extraEyes) {
      if (this.watchTime > ex.opensAt) this.drawSmallEye(ex, a);
    }
    if (this.watchTime > 40) {
      ctx.font = '17px "VT323", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(160,70,70,' + (0.4 * a) + ')';
      ctx.fillText('it has been watching for ' + (this.watchTime | 0) + ' seconds.', W / 2, H - 116);
      ctx.textAlign = 'left';
    }
    ctx.restore();
  },
};

// ------------------------------------------------ 87.0 DEAD AIR (hidden)
const stationDeadAir = {
  id: 'deadair', f: 87.0, name: 'DEAD AIR', sub: '', hint: '',
  hidden: true, audioLevel: 0.0,
  signal: 0, tunedFor: 0, beatT: 0,
  resize() {},
  update(dt) {
    if (this.signal > 0.8) this.tunedFor += dt; else this.tunedFor = 0;
    this.beatT -= dt;
    if (this.beatT <= 0 && this.signal > 0.7) {
      this.beatT = 1.15;
      blipAt(0, 46, 0.14, 'sine', 0.30);
      blipAt(0.18, 40, 0.16, 'sine', 0.22);
    }
  },
  draw(a) {
    const beat = Math.pow(Math.max(0, Math.sin(timeNow * 1.1)), 12);
    ctx.save();
    ctx.globalAlpha = a;
    const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.min(W, H) * 0.4);
    grad.addColorStop(0, 'rgba(120,0,0,' + (0.05 + beat * 0.07) + ')');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.font = '22px "VT323", monospace';
    ctx.textAlign = 'center';
    if (this.tunedFor > 3) {
      ctx.fillStyle = 'rgba(160,60,60,' + (a * clamp(this.tunedFor - 3, 0, 1)) + ')';
      ctx.fillText('there is nothing at the bottom of the dial.', W / 2, H / 2);
    }
    if (this.tunedFor > 7) {
      ctx.fillStyle = 'rgba(120,50,50,' + (a * clamp(this.tunedFor - 7, 0, 1) * 0.8) + ')';
      ctx.fillText('(only a heartbeat. ignore it.)', W / 2, H / 2 + 36);
    }
    ctx.textAlign = 'left';
    ctx.restore();
  },
};

// ------------------------------------------------ 100.0 THE BROADCAST (hidden finale)
const BROADCAST_LINES = [
  'you found them all.',
  'eleven lights in twenty-one megahertz of dark.',
  'most people scroll past.',
  'you stayed. you tuned. you listened.',
  'this station does not exist.',
  'neither do i.',
  'but the dial is yours now.',
  '87.0 to 108.0. forever.',
  '— the operator',
];
const stationBroadcast = {
  id: 'broadcast', f: 100.0, name: 'THE BROADCAST', sub: 'for you. only you.',
  hint: '',
  hidden: true, audioLevel: 0.09,
  voices: [
    { type: 'sine', f: 130.8, cut: 700, lvl: 0.3 },
    { type: 'sine', f: 196, cut: 900, lvl: 0.2 },
    { type: 'sine', f: 246.9, cut: 1100, lvl: 0.16 },
    { type: 'sine', f: 293.7, cut: 1300, lvl: 0.12 },
    { type: 'triangle', f: 65.4, cut: 300, lvl: 0.3 },
  ],
  signal: 0, lineIndex: 0, charIndex: 0, charTimer: 0, holdTimer: 0, finished: false,

  resize() {},

  update(dt) {
    stationRain.update(dt);
    stationSky.update(dt);
    stationEye.update(dt);

    if (!seenBroadcast && this.signal > 0.8) {
      seenBroadcast = true;
      try { localStorage.setItem('nightdial_broadcast', '1'); } catch (e) {}
      toast('◉ THE BROADCAST');
      discoveryJingle();
    }

    if (this.finished) return;
    if (this.holdTimer > 0) { this.holdTimer -= dt; return; }
    this.charTimer -= dt;
    if (this.charTimer <= 0) {
      this.charTimer = 0.055;
      const line = BROADCAST_LINES[this.lineIndex];
      if (this.charIndex < line.length) {
        this.charIndex++;
        if (this.signal > 0.4) blip(rand(900, 1200), 0.012, 'square', 0.012);
      } else {
        this.holdTimer = 1.6;
        if (this.lineIndex < BROADCAST_LINES.length - 1) {
          this.lineIndex++;
          this.charIndex = 0;
        } else {
          this.finished = true;
        }
      }
    }
  },

  draw(a) {
    ctx.save();
    stationSky.draw(a * 0.6);
    stationRain.draw(a * 0.16);
    stationEye.draw(a * 0.25);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(0,0,0,' + (0.45 * a) + ')';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '30px "VT323", monospace';
    const baseY = H / 2 - BROADCAST_LINES.length * 22;
    for (let i = 0; i < this.lineIndex; i++) {
      ctx.fillStyle = 'rgba(235,225,180,' + (0.75 * a) + ')';
      ctx.fillText(BROADCAST_LINES[i], W / 2, baseY + i * 44);
    }
    const current = BROADCAST_LINES[this.lineIndex].slice(0, this.charIndex);
    ctx.fillStyle = 'rgba(255,245,200,' + (0.95 * a) + ')';
    ctx.fillText(current + (Math.floor(timeNow * 2.4) % 2 === 0 && !this.finished ? '█' : ''), W / 2, baseY + this.lineIndex * 44);
    if (this.finished) {
      ctx.font = '19px "VT323", monospace';
      ctx.fillStyle = 'rgba(190,200,160,' + ((0.4 + 0.2 * Math.sin(timeNow * 1.5)) * a) + ')';
      ctx.fillText('(stay as long as you like.)', W / 2, baseY + BROADCAST_LINES.length * 44 + 30);
    }
    ctx.textAlign = 'left';
    ctx.restore();
  },
};

const STATIONS = [
  stationDeadAir, stationRain, stationEmber, stationBloom, stationSwarm,
  stationCollapse, stationMirror, stationGhost, stationBroadcast,
  stationNumbers, stationSky, stationUndertow, stationEye,
];

function strongestStation() {
  let best = null;
  for (const st of STATIONS) if (!best || st.signal > best.signal) best = st;
  return best;
}

// ---------------------------------------------------------------- UI drawing

function drawUI(maxSignal) {
  const flicker = 0.86 + Math.random() * 0.14;
  ctx.save();
  ctx.textBaseline = 'alphabetic';

  ctx.font = '20px "VT323", monospace';
  ctx.fillStyle = 'rgba(110,190,130,' + (0.85 * flicker) + ')';
  ctx.fillText('NIGHTDIAL', 28, 40);
  ctx.font = '56px "VT323", monospace';
  ctx.fillStyle = 'rgba(190,255,205,' + (0.92 * flicker) + ')';
  const freqText = freq.toFixed(1);
  ctx.fillText(freqText, 28, 92);
  const freqWidth = ctx.measureText(freqText).width;
  ctx.font = '22px "VT323", monospace';
  ctx.fillStyle = 'rgba(110,190,130,0.7)';
  ctx.fillText('MHz', 28 + freqWidth + 12, 92);

  const active = strongestStation();
  const showName = active && active.signal > 0.25 && (!active.hidden || active.id === 'broadcast');
  if (showName) {
    const a = clamp((active.signal - 0.25) / 0.5, 0, 1);
    ctx.textAlign = 'center';
    ctx.font = '42px "VT323", monospace';
    ctx.fillStyle = active.id === 'broadcast'
      ? 'rgba(255,240,190,' + (a * 0.95 * flicker) + ')'
      : 'rgba(225,255,235,' + (a * 0.95 * flicker) + ')';
    ctx.fillText(active.name, W / 2, 64);
    ctx.font = '20px "VT323", monospace';
    ctx.fillStyle = 'rgba(140,210,160,' + (a * 0.75) + ')';
    ctx.fillText(active.sub, W / 2, 92);
    ctx.textAlign = 'left';
  }

  const bars = 14;
  const lit = Math.round(maxSignal * bars);
  for (let i = 0; i < bars; i++) {
    const on = i < lit;
    ctx.fillStyle = on ? 'rgba(120,255,160,' + (0.5 + i / bars * 0.5) + ')' : 'rgba(80,120,90,0.22)';
    ctx.fillRect(W - 30 - (bars - i) * 11, 34, 7, 16 + i * 1.4);
  }
  ctx.font = '16px "VT323", monospace';
  ctx.fillStyle = 'rgba(110,190,130,0.6)';
  ctx.textAlign = 'right';
  ctx.fillText('SIGNAL', W - 30, 24);
  ctx.textAlign = 'left';

  // ---- dial
  const dialY = H - 52;
  ctx.strokeStyle = 'rgba(120,200,140,0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(70, dialY);
  ctx.lineTo(W - 70, dialY);
  ctx.stroke();
  ctx.font = '16px "VT323", monospace';
  for (let f = Math.ceil(FREQ_MIN); f <= FREQ_MAX; f++) {
    const x = freqToX(f);
    const major = f % 3 === 0;
    ctx.strokeStyle = 'rgba(120,200,140,' + (major ? 0.55 : 0.3) + ')';
    ctx.beginPath();
    ctx.moveTo(x, dialY);
    ctx.lineTo(x, dialY - (major ? 12 : 7));
    ctx.stroke();
    if (major) {
      ctx.fillStyle = 'rgba(120,200,140,0.55)';
      ctx.textAlign = 'center';
      ctx.fillText(String(f), x, dialY + 22);
    }
  }
  ctx.textAlign = 'left';

  for (const st of STATIONS) {
    if (!foundSet.has(st.f) && !(st.id === 'broadcast' && seenBroadcast)) continue;
    if (st.id === 'broadcast' && !seenBroadcast) continue;
    const x = freqToX(st.f);
    const pulse = 0.6 + 0.4 * Math.sin(timeNow * 3 + st.f);
    if (st.id === 'broadcast') ctx.fillStyle = 'rgba(255,215,130,' + (0.9 * pulse) + ')';
    else if (st.hidden) ctx.fillStyle = 'rgba(160,70,70,' + (0.5 * pulse) + ')';
    else ctx.fillStyle = 'rgba(140,255,175,' + (0.85 * pulse) + ')';
    ctx.beginPath();
    ctx.arc(x, dialY - 18, 3, 0, TAU);
    ctx.fill();
  }

  const needleX = freqToX(freq);
  const needleColor = seenBroadcast ? 'rgba(255,224,150,0.95)' : 'rgba(255,240,200,0.95)';
  ctx.strokeStyle = needleColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(needleX, dialY - 26);
  ctx.lineTo(needleX, dialY + 8);
  ctx.stroke();
  ctx.fillStyle = needleColor;
  ctx.beginPath();
  ctx.moveTo(needleX - 5, dialY - 32);
  ctx.lineTo(needleX + 5, dialY - 32);
  ctx.lineTo(needleX, dialY - 24);
  ctx.closePath();
  ctx.fill();
  const needleGlow = ctx.createRadialGradient(needleX, dialY - 10, 0, needleX, dialY - 10, 40);
  needleGlow.addColorStop(0, seenBroadcast ? 'rgba(255,215,130,0.22)' : 'rgba(255,240,200,0.18)');
  needleGlow.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = needleGlow;
  ctx.fillRect(needleX - 40, dialY - 50, 80, 80);

  // ---- hint
  let hint = '';
  if (active && active.signal > 0.6 && !active.hidden) hint = active.hint;
  else if (timeNow - bootAt < 14) hint = 'scroll to tune · or drag the dial';
  else if (visibleFoundCount() === 0) hint = 'stations hide between the static';
  if (hint) {
    ctx.font = '19px "VT323", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(170,225,185,' + (0.55 + 0.2 * Math.sin(timeNow * 2)) + ')';
    ctx.fillText(hint, W / 2, H - 88);
    ctx.textAlign = 'left';
  }

  // ---- footer
  const foundCount = visibleFoundCount();
  const total = totalVisible();
  ctx.font = '17px "VT323", monospace';
  ctx.fillStyle = 'rgba(110,190,130,0.6)';
  ctx.fillText('[space] scan   [m] mute   [←→] fine tune', 28, H - 14);
  ctx.textAlign = 'right';
  if (seenBroadcast) {
    ctx.fillStyle = 'rgba(255,224,150,0.85)';
    ctx.fillText('THE DIAL IS YOURS', W - 28, H - 14);
  } else if (foundCount === total) {
    ctx.fillStyle = 'rgba(255,230,140,' + (0.6 + 0.35 * Math.sin(timeNow * 2.5)) + ')';
    ctx.fillText('ALL ' + total + ' FOUND — BUT THE NUMBERS CHANGED', W - 28, H - 14);
  } else {
    ctx.fillStyle = 'rgba(110,190,130,0.7)';
    ctx.fillText(foundCount + '/' + total + ' STATIONS FOUND', W - 28, H - 14);
  }
  ctx.textAlign = 'left';

  // ---- toasts
  for (let i = toasts.length - 1; i >= 0; i--) {
    const tst = toasts[i];
    const age = timeNow - tst.born;
    if (age > 3) { toasts.splice(i, 1); continue; }
    if (age < 0) continue;
    const a = clamp(age < 0.3 ? age / 0.3 : age > 2.2 ? 1 - (age - 2.2) / 0.8 : 1, 0, 1);
    ctx.font = '26px "VT323", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,235,170,' + (a * 0.95) + ')';
    ctx.fillText(tst.text, W / 2, 140 + i * 34);
    ctx.textAlign = 'left';
  }

  // ---- click ripples: every click visibly lands, everywhere
  for (let i = clickRipples.length - 1; i >= 0; i--) {
    const r = clickRipples[i];
    r.t += 0.016;
    if (r.t > 0.5) { clickRipples.splice(i, 1); continue; }
    const k = r.t / 0.5;
    ctx.strokeStyle = 'rgba(220,255,230,' + ((1 - k) * 0.8) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(r.x, r.y, 6 + k * 30, 0, TAU);
    ctx.stroke();
  }

  // ---- dead click: clicked into pure static
  if (deadClick && timeNow - deadClick.born < 1.4) {
    const k = (timeNow - deadClick.born) / 1.4;
    ctx.font = '17px "VT323", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(170,200,180,' + ((1 - k) * 0.7) + ')';
    ctx.fillText('just static here. keep tuning.', deadClick.x, deadClick.y - 24 - k * 14);
    ctx.textAlign = 'left';
  }

  // ---- custom cursor
  ctx.strokeStyle = 'rgba(200,255,215,0.85)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, mouse.down ? 4.5 : 7, 0, TAU);
  ctx.stroke();
  ctx.fillStyle = 'rgba(220,255,230,0.9)';
  ctx.fillRect(mouse.x - 1, mouse.y - 1, 2, 2);

  ctx.restore();
}

// ---------------------------------------------------------------- main loop

let bloomCanvas = null, bloomCtx = null;

function resize() {
  W = innerWidth; H = innerHeight;
  screenEl.width = Math.round(W * dpr);
  screenEl.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (typeof ctx.filter === 'string') {
    bloomCanvas = document.createElement('canvas');
    bloomCanvas.width = Math.max(1, W >> 2);
    bloomCanvas.height = Math.max(1, H >> 2);
    bloomCtx = bloomCanvas.getContext('2d');
  }
  for (const st of STATIONS) st.resize();
}
addEventListener('resize', resize);
resize();

if (/^#\d{2,3}\.\d$/.test(location.hash)) {
  const f = parseFloat(location.hash.slice(1));
  if (f >= FREQ_MIN && f <= FREQ_MAX) { freq = f; targetFreq = f; }
}

let lastFrame = performance.now();
let hashFrameCounter = 0;

function frame(now) {
  requestAnimationFrame(frame);
  const dt = clamp((now - lastFrame) / 1000, 0.001, 0.05);
  lastFrame = now;
  if (!started) return;
  timeNow = now / 1000;

  // idle attract: the radio tunes itself if you walk away
  if (now - lastInput > 45000) {
    if (idleTarget === null) {
      const undiscovered = STATIONS.filter(s => !s.hidden && !foundSet.has(s.f));
      const pool = undiscovered.length ? undiscovered : STATIONS.filter(s => !s.hidden);
      idleTarget = pick(pool).f;
    }
    const diff = idleTarget - targetFreq;
    if (Math.abs(diff) < 0.02) {
      if (now - lastInput > 45000 + 20000) { idleTarget = null; lastInput = now - 45000; }
    } else {
      targetFreq += Math.sign(diff) * Math.min(Math.abs(diff), 0.22 * dt);
    }
  } else {
    idleTarget = null;
  }

  freq = lerp(freq, targetFreq, Math.min(1, dt * 7));

  const allFound = visibleFoundCount() === totalVisible();
  let maxSignal = 0;
  for (const st of STATIONS) {
    const d = Math.abs(freq - st.f);
    let s = Math.max(0, 1 - (d / 0.55) * (d / 0.55));
    s = s * s * (3 - 2 * s);
    if (st.id === 'broadcast' && !allFound) s = 0;
    st.signal = s;
    if (s > maxSignal) maxSignal = s;
    if (s > 0.85 && !foundSet.has(st.f)) {
      foundSet.add(st.f);
      persistFound();
      if (!st.hidden) {
        toast('◉ SIGNAL ACQUIRED — ' + st.name + ' ' + st.f.toFixed(1));
        discoveryJingle();
        if (visibleFoundCount() === totalVisible()) {
          toasts.push({ text: 'THE NUMBERS HAVE CHANGED. LISTEN AT 101.1', born: timeNow + 3 });
        }
      }
    }
  }
  const noiseLevel = clamp(1 - maxSignal, 0, 1) * 0.96 + 0.04;

  for (const st of STATIONS) {
    if (st.signal <= 0.02) continue;
    try { st.update(dt); } catch (e) {}
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const ordered = [...STATIONS].sort((a, b) => a.signal - b.signal);
  for (const st of ordered) {
    if (st.signal <= 0.02) continue;
    ctx.save();
    try { st.draw(st.signal); } catch (e) {}
    ctx.restore();
  }

  // bloom post-pass: quarter-res additive blur over everything drawn so far
  if (bloomCtx && maxSignal > 0.05) {
    bloomCtx.globalCompositeOperation = 'copy';
    bloomCtx.drawImage(screenEl, 0, 0, bloomCanvas.width, bloomCanvas.height);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.40 * maxSignal;
    ctx.filter = 'blur(7px)';
    ctx.drawImage(bloomCanvas, 0, 0, W, H);
    ctx.restore();
  }

  drawGlyphEvent(maxSignal);
  drawStatic(noiseLevel * (0.25 + 0.75 * (1 - maxSignal)));
  drawUI(maxSignal);

  const boot = timeNow - bootAt;
  if (boot < 0.8) {
    const k = boot / 0.8;
    ctx.fillStyle = 'rgba(255,255,255,' + (1 - k) + ')';
    const lineH = Math.max(2, H * Math.pow(k, 2.5));
    ctx.fillRect(0, H / 2 - lineH / 2, W, lineH);
  }

  // title + hash, throttled
  hashFrameCounter++;
  if (hashFrameCounter % 90 === 0) {
    const active = strongestStation();
    const newTitle = (active && active.signal > 0.5 && !active.hidden)
      ? active.name + ' — ' + freq.toFixed(1) + ' NIGHTDIAL'
      : 'NIGHTDIAL — ' + freq.toFixed(1);
    if (newTitle !== lastTitle) { document.title = newTitle; lastTitle = newTitle; }
    const newHash = '#' + freq.toFixed(1);
    if (newHash !== lastHash && Math.abs(freq - targetFreq) < 0.05) {
      lastHash = newHash;
      try { history.replaceState(null, '', newHash); } catch (e) {}
    }
  }

  updateAudio(dt, noiseLevel);
}
requestAnimationFrame(frame);

// ---------------------------------------------------------------- power on

document.getElementById('intro').addEventListener('click', () => {
  if (started) return;
  started = true;
  bootAt = performance.now() / 1000;
  lastInput = performance.now();
  document.getElementById('intro').classList.add('off');
  try { initAudio(); } catch (e) {}
});
</script>
</body>
</html>
