<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NIGHTDIAL — 87.0 to 108.0</title>
<meta name="description" content="A radio for the frequencies between frequencies. Eleven stations are hiding in the static. Some say there are more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  body { font-family: "VT323", monospace; cursor: none; }
  canvas#screen { position: fixed; inset: 0; display: block; }

  #crt { position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0px, rgba(0,0,0,0.22) 1px, transparent 1px, transparent 3px);
    animation: crtflicker 7s infinite;
  }
  @keyframes crtflicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.86; }
    94% { opacity: 1; }
    97% { opacity: 0.93; }
    98% { opacity: 1; }
  }

  #intro { position: fixed; inset: 0; z-index: 10; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #9dffb0; text-align: center; cursor: pointer;
    transition: opacity 0.9s ease; user-select: none;
  }
  #intro.off { opacity: 0; pointer-events: none; }
  #intro h1 { font-size: clamp(64px, 12vw, 150px); font-weight: 400; letter-spacing: 0.08em;
    text-shadow: 0 0 12px #2cff6e, 0 0 60px rgba(44,255,110,0.45);
    animation: titlebreathe 4s ease-in-out infinite;
  }
  @keyframes titlebreathe {
    0%, 100% { text-shadow: 0 0 12px #2cff6e, 0 0 50px rgba(44,255,110,0.35); }
    50% { text-shadow: 0 0 18px #2cff6e, 0 0 90px rgba(44,255,110,0.6); }
  }
  #intro p { font-size: clamp(18px, 2.4vw, 28px); color: #5fae72; margin-top: 14px; letter-spacing: 0.06em; }
  #intro .power { margin-top: 56px; font-size: clamp(20px, 2.6vw, 30px); color: #d8ffe2;
    border: 1px solid #2f6b40; padding: 10px 34px;
    animation: powerpulse 1.6s ease-in-out infinite;
  }
  @keyframes powerpulse {
    0%, 100% { opacity: 0.45; box-shadow: 0 0 0 rgba(44,255,110,0); }
    50% { opacity: 1; box-shadow: 0 0 26px rgba(44,255,110,0.35); }
  }
  #intro .fine { position: absolute; bottom: 26px; font-size: 16px; color: #3c5c46; letter-spacing: 0.1em; }
</style>
</head>
<body>
<canvas id="screen"></canvas>
<div id="crt"></div>
<div id="intro">
  <h1>NIGHTDIAL</h1>
  <p>a radio for the frequencies between frequencies.</p>
  <p>eleven stations are hiding in the static. some say there are more.</p>
  <div class="power">[ CLICK TO POWER ON — SOUND RECOMMENDED ]</div>
  <div class="fine">scroll to tune &nbsp;·&nbsp; space to scan &nbsp;·&nbsp; the dial remembers what you find</div>
</div>

<script>
'use strict';

const TAU = Math.PI * 2;
const screenEl = document.getElementById('screen');
const ctx = screenEl.getContext('2d');
const dpr = Math.min(window.devicePixelRatio || 1, 1.75);
let W = 0, H = 0;

const rand = (a, b) => a + Math.random() * (b - a);
const pick = arr => arr[(Math.random() * arr.length) | 0];
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, k) => a + (b - a) * k;
const dist2 = (ax, ay, bx, by) => (ax - bx) * (ax - bx) + (ay - by) * (ay - by);

// ---------------------------------------------------------------- tuner state

const FREQ_MIN = 87.0, FREQ_MAX = 108.0;
let freq = 87.9;
let targetFreq = 87.9;
let started = false;
let bootAt = 0;
let timeNow = 0;
let muted = false;
let lastInput = performance.now();
let idleTarget = null;
let lastHash = '';
let lastTitle = '';
let glyphEvent = null;

const toasts = [];
function toast(text) { toasts.push({ text, born: timeNow }); }

let foundSet = new Set();
let seenBroadcast = false;
try {
  foundSet = new Set(JSON.parse(localStorage.getItem('nightdial_found') || '[]'));
  seenBroadcast = localStorage.getItem('nightdial_broadcast') === '1';
} catch (e) {}
function persistFound() {
  try { localStorage.setItem('nightdial_found', JSON.stringify([...foundSet])); } catch (e) {}
}

function visibleFoundCount() {
  let n = 0;
  for (const st of STATIONS) if (!st.hidden && foundSet.has(st.f)) n++;
  return n;
}
function totalVisible() {
  let n = 0;
  for (const st of STATIONS) if (!st.hidden) n++;
  return n;
}

// ---------------------------------------------------------------- input

const mouse = { x: innerWidth / 2, y: innerHeight / 2, down: false, speed: 0, dxs: 0, lastMove: 0, lastT: 0 };
let dialDragging = false;

function dialZone(y) { return y > H - 96; }
function freqToX(f) { return 70 + (f - FREQ_MIN) / (FREQ_MAX - FREQ_MIN) * (W - 140); }
function xToFreq(x) { return clamp(FREQ_MIN + (x - 70) / (W - 140) * (FREQ_MAX - FREQ_MIN), FREQ_MIN, FREQ_MAX); }

addEventListener('pointermove', e => {
  const now = performance.now();
  const dt = Math.max(1, now - mouse.lastT);
  const instSpeed = Math.hypot(e.clientX - mouse.x, e.clientY - mouse.y) / dt * 1000;
  mouse.speed = lerp(mouse.speed, instSpeed, 0.3);
  mouse.dxs = lerp(mouse.dxs, e.clientX - mouse.x, 0.2);
  mouse.x = e.clientX; mouse.y = e.clientY;
  mouse.lastT = now; mouse.lastMove = now;
  lastInput = now;
  if (e.pointerType === 'mouse' && (e.buttons & 1) === 0 && mouse.down) {
    mouse.down = false; dialDragging = false;
  }
  if (dialDragging) targetFreq = xToFreq(e.clientX);
});

addEventListener('pointercancel', () => { mouse.down = false; dialDragging = false; });
addEventListener('blur', () => { mouse.down = false; dialDragging = false; });

const clickRipples = [];
let deadClick = null;

addEventListener('pointerdown', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
  mouse.down = true;
  lastInput = performance.now();
  if (!started) return;
  clickRipples.push({ x: e.clientX, y: e.clientY, t: 0 });
  if (dialZone(e.clientY)) { dialDragging = true; targetFreq = xToFreq(e.clientX); return; }
  const st = strongestStation();
  if (st && st.signal > 0.45 && st.onClick) st.onClick(e.clientX, e.clientY);
  else if (!st || st.signal < 0.45) deadClick = { x: e.clientX, y: e.clientY, born: timeNow };
});

addEventListener('pointerup', () => { mouse.down = false; dialDragging = false; });

addEventListener('wheel', e => {
  if (!started) return;
  e.preventDefault();
  lastInput = performance.now();
  targetFreq = clamp(targetFreq + e.deltaY * 0.0021, FREQ_MIN, FREQ_MAX);
}, { passive: false });

function scanToNext() {
  const visible = STATIONS.filter(s => !s.hidden).map(s => s.f).sort((a, b) => a - b);
  const next = visible.find(f => f > freq + 0.3);
  targetFreq = next !== undefined ? next : visible[0];
}

addEventListener('keydown', e => {
  if (!started) return;
  lastInput = performance.now();
  const ghostActive = stationGhost.signal > 0.5;

  if (e.key === 'ArrowLeft') { e.preventDefault(); targetFreq = clamp(targetFreq - 0.1, FREQ_MIN, FREQ_MAX); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); targetFreq = clamp(targetFreq + 0.1, FREQ_MIN, FREQ_MAX); return; }

  if (ghostActive) {
    if (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Enter') {
      e.preventDefault();
      stationGhost.onKey(e.key);
      return;
    }
  }
  if (stationNumbers.signal > 0.5 && /^[0-9]$/.test(e.key)) { stationNumbers.parrot(e.key); return; }
  if (stationBloom.signal > 0.5 && (e.key === 'g' || e.key === 'G')) { stationBloom.gliderGun(mouse.x, mouse.y); toast('GLIDER GUN PLANTED'); return; }
  if (stationBloom.signal > 0.5 && (e.key === 'r' || e.key === 'R')) { stationBloom.reseed(); toast('GARDEN RESEEDED'); return; }
  if (e.key === ' ') { e.preventDefault(); scanToNext(); return; }
  if (e.key === 'm' || e.key === 'M') { muted = !muted; if (muted) try { speechSynthesis.cancel(); } catch (err) {} toast(muted ? 'AUDIO MUTED' : 'AUDIO ON'); return; }
  if (e.key === 'c' || e.key === 'C') {
    if (stationSky.signal > 0.5) { stationSky.clearSky(); toast('SKY CLEARED'); }
  }
});

// ---------------------------------------------------------------- audio

let AC = null, masterGain = null, noiseGainNode = null;
let masterLevel = 0, noiseLevelSmooth = 0;

function buildVoice(destination, v) {
  const osc = AC.createOscillator();
  osc.type = v.type;
  osc.frequency.value = v.f;
  const filter = AC.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = v.cut;
  const voiceGain = AC.createGain();
  voiceGain.gain.value = v.lvl;
  const lfo = AC.createOscillator();
  const lfoGain = AC.createGain();
  if (v.vib) {
    lfo.frequency.value = v.vib.rate;
    lfoGain.gain.value = v.vib.depth;
  } else {
    lfo.frequency.value = rand(0.05, 0.22);
    lfoGain.gain.value = rand(3, 9);
  }
  lfo.connect(lfoGain).connect(osc.detune);
  osc.connect(filter).connect(voiceGain).connect(destination);
  osc.start(); lfo.start();
}

function initAudio() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  const compressor = AC.createDynamicsCompressor();
  masterGain = AC.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(compressor).connect(AC.destination);

  const noiseLen = 2 * AC.sampleRate;
  const noiseBuf = AC.createBuffer(1, noiseLen, AC.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) data[i] = Math.random() * 2 - 1;
  const noiseSrc = AC.createBufferSource();
  noiseSrc.buffer = noiseBuf; noiseSrc.loop = true;
  const noiseFilter = AC.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 1100;
  noiseFilter.Q.value = 0.4;
  noiseGainNode = AC.createGain();
  noiseGainNode.gain.value = 0;
  noiseSrc.connect(noiseFilter).connect(noiseGainNode).connect(masterGain);
  noiseSrc.start();

  for (const st of STATIONS) {
    if (!st.voices) continue;
    st.gainNode = AC.createGain();
    st.gainNode.gain.value = 0;
    st.gainNode.connect(masterGain);
    st.gainSmooth = 0;
    for (const v of st.voices) buildVoice(st.gainNode, v);
  }
}

function blipAt(offset, f, dur, type, vol, glideTo) {
  if (!AC || muted) return;
  try {
    const t0 = AC.currentTime + offset;
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(f, t0);
    if (glideTo) osc.frequency.exponentialRampToValueAtTime(Math.max(1, glideTo), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  } catch (e) {}
}
function blip(f, dur, type, vol, glideTo) { blipAt(0, f, dur, type, vol, glideTo); }

function discoveryJingle() {
  blipAt(0, 523.25, 0.22, 'triangle', 0.10);
  blipAt(0.09, 659.25, 0.22, 'triangle', 0.10);
  blipAt(0.18, 783.99, 0.34, 'triangle', 0.10);
}

const DIGIT_WORDS = ['zero', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
function speak(text, volume) {
  if (muted || !('speechSynthesis' in window)) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.7; u.pitch = 0.4; u.volume = clamp(volume, 0, 1);
    speechSynthesis.speak(u);
  } catch (e) {}
}

function updateAudio(dt, noiseLevel) {
  if (!AC) return;
  const targetMaster = muted ? 0 : 0.65;
  masterLevel = lerp(masterLevel, targetMaster, Math.min(1, dt * 4));
  masterGain.gain.value = masterLevel;
  noiseLevelSmooth = lerp(noiseLevelSmooth, noiseLevel * 0.16, Math.min(1, dt * 8));
  noiseGainNode.gain.value = noiseLevelSmooth;
  for (const st of STATIONS) {
    if (!st.gainNode) continue;
    st.gainSmooth = lerp(st.gainSmooth, st.signal * st.audioLevel, Math.min(1, dt * 8));
    st.gainNode.gain.value = st.gainSmooth;
  }
}

// ---------------------------------------------------------------- static / noise

const noiseCanvas = document.createElement('canvas');
noiseCanvas.width = 192; noiseCanvas.height = 108;
const noiseCtx = noiseCanvas.getContext('2d');
const noiseImage = noiseCtx.createImageData(192, 108);
let tearY = -1, tearLife = 0;

function drawStatic(level) {
  if (level < 0.015) return;
  const px = noiseImage.data;
  const bright = 90 + level * 165;
  for (let i = 0; i < px.length; i += 4) {
    const v = (Math.random() * bright) | 0;
    px[i] = v; px[i + 1] = v; px[i + 2] = v; px[i + 3] = 255;
  }
  noiseCtx.putImageData(noiseImage, 0, 0);
  ctx.save();
  ctx.globalAlpha = clamp(level, 0, 1) * 0.92;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(noiseCanvas, 0, 0, W, H);
  ctx.imageSmoothingEnabled = true;

  if (tearLife <= 0 && Math.random() < level * 0.04) {
    tearY = Math.random() * H;
    tearLife = rand(0.1, 0.4);
  }
  if (tearLife > 0) {
    ctx.globalAlpha = level * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, tearY, W, 2);
    ctx.globalAlpha = level * 0.2;
    ctx.fillRect(0, tearY - 8, W, 18);
    tearY += rand(-30, 30);
  }
  ctx.restore();
}

function drawGlyphEvent(maxSignal) {
  if (!glyphEvent && maxSignal < 0.35 && Math.random() < 0.00022) {
    const allFound = visibleFoundCount() === totalVisible();
    const char = (allFound && !seenBroadcast) ? '100.0' : pick(['◉', '▲', '?', '※', 'TUNE', 'STAY']);
    glyphEvent = { char, until: timeNow + 3 };
  }
  if (!glyphEvent) return;
  if (timeNow > glyphEvent.until || maxSignal > 0.5) { glyphEvent = null; return; }
  ctx.save();
  ctx.globalAlpha = 0.07 + 0.05 * Math.sin(timeNow * 31);
  ctx.fillStyle = '#cfe8d6';
  ctx.font = Math.round(H * 0.42) + 'px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(glyphEvent.char, W / 2, H / 2);
  ctx.restore();
}

// ================================================================ STATIONS

// ------------------------------------------------ 88.3 THE RAIN
const RAIN_GLYPHS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789$#%&@ZX';
const RAIN_WORDS = ['STAY', 'TUNE', 'LISTEN', 'OPERATOR', '1987', 'SIGNAL', 'BELOW', 'AGAIN'];
const stationRain = {
  id: 'rain', f: 88.3, name: 'THE RAIN', sub: 'it remembers being code',
  hint: 'it is afraid of your cursor. click to scatter it.',
  audioLevel: 0.10,
  voices: [
    { type: 'sawtooth', f: 55, cut: 240, lvl: 0.5 },
    { type: 'sawtooth', f: 82.5, cut: 240, lvl: 0.35 },
    { type: 'sine', f: 110, cut: 500, lvl: 0.25 },
  ],
  signal: 0, streams: [], cs: 18, shock: null,

  resize() {
    const count = Math.ceil(W / this.cs);
    this.streams = [];
    for (let i = 0; i < count; i++) {
      const layer = Math.random() < 0.3 ? 0 : Math.random() < 0.55 ? 1 : 2;
      this.streams.push({
        col: i, y: rand(-H, H), sp: rand(130, 380) * [0.55, 1, 1.5][layer], len: (rand(8, 22)) | 0,
        xoff: 0, xv: 0, seed: (Math.random() * 1000) | 0,
        word: Math.random() < 0.05 ? pick(RAIN_WORDS) : null,
        layer, cs: [12, 18, 24][layer], dim: [0.40, 0.75, 1][layer],
      });
    }
    this.streams.sort((a, b) => a.layer - b.layer);
  },

  onClick(x, y) { this.shock = { x, y, t: 0 }; blip(140, 0.4, 'sawtooth', 0.10, 50); },

  update(dt) {
    if (this.shock) {
      this.shock.t += dt;
      if (this.shock.t > 0.7) this.shock = null;
    }
    const panic = clamp(mouse.speed / 1800, 0, 1.4);
    for (const s of this.streams) {
      const headX = s.col * this.cs + this.cs / 2 + s.xoff;
      const dx = headX - mouse.x;
      const dy = s.y - mouse.y;
      const d2 = dx * dx + dy * dy;
      let fear = 0;
      if (d2 < 180 * 180) {
        const d = Math.sqrt(d2) + 1;
        fear = (1 - d / 180);
        s.xv += (dx / d) * fear * 2400 * dt;
      }
      if (this.shock) {
        const sx = headX - this.shock.x, sy = s.y - this.shock.y;
        const sd = Math.hypot(sx, sy) + 1;
        const wave = Math.abs(sd - this.shock.t * 1400);
        if (wave < 90) {
          s.xv += (sx / sd) * 3000 * dt * (1 - wave / 90);
          s.y += (sy / sd) * 900 * dt * (1 - wave / 90);
        }
      }
      s.xv += -s.xoff * 5 * dt;
      s.xv *= Math.pow(0.04, dt);
      s.xoff = clamp(s.xoff + s.xv * dt, -70, 70);
      s.y += s.sp * (1 + fear * 2.2 + panic * 0.6) * dt;
      if (s.y - s.len * this.cs > H) {
        s.y = rand(-300, -40);
        s.sp = rand(130, 380);
        s.len = (rand(8, 22)) | 0;
        s.seed = (Math.random() * 1000) | 0;
        s.word = Math.random() < 0.05 ? pick(RAIN_WORDS) : null;
      }
    }
  },

  draw(a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textBaseline = 'top';
    const flick = Math.floor(timeNow * 9);
    let currentLayer = -1;
    for (const s of this.streams) {
      if (s.layer !== currentLayer) {
        currentLayer = s.layer;
        ctx.font = s.cs + 'px "VT323", monospace';
      }
      const x = s.col * this.cs + s.xoff;
      for (let i = 0; i < s.len; i++) {
        const y = s.y - i * s.cs;
        if (y < -s.cs || y > H) continue;
        let ch;
        if (s.word && i > 0 && i <= s.word.length) {
          ch = s.word[s.word.length - i];
        } else {
          const gi = (s.seed + s.col * 31 + ((y / s.cs) | 0) * 7 + ((flick + i) % 3 === 0 ? flick : 0)) % RAIN_GLYPHS.length;
          ch = RAIN_GLYPHS[Math.abs(gi)];
        }
        const fade = (1 - i / s.len) * s.dim;
        if (i === 0) {
          if (s.layer === 2) {
            ctx.shadowColor = 'rgba(120,255,170,0.9)';
            ctx.shadowBlur = 10;
          }
          ctx.fillStyle = 'rgba(225,255,235,' + (0.95 * s.dim * a) + ')';
          ctx.fillText(ch, x, y);
          ctx.shadowBlur = 0;
          continue;
        } else if (s.word && i <= s.word.length) {
          ctx.fillStyle = 'rgba(190,255,255,' + (fade * 0.95 * a).toFixed(3) + ')';
        } else {
          ctx.fillStyle = 'rgba(40,255,110,' + (fade * 0.85 * a).toFixed(3) + ')';
        }
        ctx.fillText(ch, x, y);
      }
    }
    ctx.restore();
  },
};

// ------------------------------------------------ 89.9 EMBER (fire)
const stationEmber = {
  id: 'ember', f: 89.9, name: 'EMBER', sub: 'you are the torch',
  hint: 'your cursor burns. click to detonate. wind follows your hand.',
  audioLevel: 0.11,
  voices: [
    { type: 'sawtooth', f: 58, cut: 180, lvl: 0.5 },
    { type: 'sawtooth', f: 87, cut: 220, lvl: 0.25 },
  ],
  signal: 0, scale: 6, fw: 0, fh: 0, heat: null, palette: null,
  fireCanvas: null, fireCtx: null, fireImage: null, sparks: [],

  resize() {
    this.fw = Math.ceil(W / this.scale);
    this.fh = Math.ceil(H / this.scale) + 2;
    this.heat = new Uint8Array(this.fw * this.fh);
    this.fireCanvas = document.createElement('canvas');
    this.fireCanvas.width = this.fw; this.fireCanvas.height = this.fh;
    this.fireCtx = this.fireCanvas.getContext('2d');
    this.fireImage = this.fireCtx.createImageData(this.fw, this.fh);
    this.sparks = [];
    if (!this.palette) {
      const stops = [
        [0, 0, 0, 0], [10, 70, 12, 4], [16, 165, 45, 8], [22, 235, 115, 16],
        [28, 255, 185, 45], [33, 255, 235, 140], [36, 255, 255, 230],
      ];
      this.palette = [];
      for (let i = 0; i <= 36; i++) {
        let lo = stops[0], hi = stops[stops.length - 1];
        for (let s = 0; s < stops.length - 1; s++) {
          if (i >= stops[s][0] && i <= stops[s + 1][0]) { lo = stops[s]; hi = stops[s + 1]; break; }
        }
        const k = (i - lo[0]) / Math.max(1, hi[0] - lo[0]);
        this.palette.push([
          Math.round(lerp(lo[1], hi[1], k)),
          Math.round(lerp(lo[2], hi[2], k)),
          Math.round(lerp(lo[3], hi[3], k)),
        ]);
      }
    }
  },

  onClick(x, y) {
    const cx = (x / this.scale) | 0, cy = (y / this.scale) | 0;
    for (let oy = -6; oy <= 6; oy++) {
      for (let ox = -6; ox <= 6; ox++) {
        if (ox * ox + oy * oy > 40) continue;
        const gx = clamp(cx + ox, 0, this.fw - 1), gy = clamp(cy + oy, 0, this.fh - 1);
        this.heat[gy * this.fw + gx] = 36;
      }
    }
    for (let i = 0; i < 36; i++) {
      this.sparks.push({ x, y, vx: rand(-260, 260), vy: rand(-420, -60), life: rand(0.5, 1.4) });
    }
    blip(70, 0.5, 'sawtooth', 0.14, 28);
  },

  update(dt) {
    const { fw, fh, heat } = this;
    for (let x = 0; x < fw; x++) heat[(fh - 1) * fw + x] = 30 + ((Math.random() * 7) | 0);

    if (!dialZone(mouse.y)) {
      const cx = (mouse.x / this.scale) | 0, cy = (mouse.y / this.scale) | 0;
      for (let oy = -1; oy <= 1; oy++) {
        for (let ox = -1; ox <= 1; ox++) {
          const gx = clamp(cx + ox, 0, fw - 1), gy = clamp(cy + oy, 0, fh - 1);
          heat[gy * fw + gx] = 36;
        }
      }
    }

    const wind = clamp(mouse.dxs * 0.12, -1, 1);
    for (let y = 1; y < fh; y++) {
      const rowSrc = y * fw, rowDst = (y - 1) * fw;
      for (let x = 0; x < fw; x++) {
        const src = heat[rowSrc + x];
        let dx = x + (((Math.random() * 3) | 0) - 1);
        if (Math.random() < Math.abs(wind)) dx += wind > 0 ? 1 : -1;
        if (dx < 0) dx = 0; else if (dx >= fw) dx = fw - 1;
        const decay = (Math.random() * 2.4) | 0;
        heat[rowDst + dx] = src > decay ? src - decay : 0;
      }
    }

    for (let i = this.sparks.length - 1; i >= 0; i--) {
      const sp = this.sparks[i];
      sp.life -= dt;
      sp.vy += 460 * dt;
      sp.x += sp.vx * dt;
      sp.y += sp.vy * dt;
      if (sp.life <= 0) this.sparks.splice(i, 1);
    }

    // ambient embers rising off the fire bed
    if (!this.embers) this.embers = [];
    if (this.signal > 0.3 && this.embers.length < 70 && Math.random() < dt * 14) {
      this.embers.push({ x: rand(0, W), y: H - rand(0, 40), vx: rand(-12, 12), vy: rand(-90, -30), life: rand(2, 5), seed: rand(0, TAU) });
    }
    for (let i = this.embers.length - 1; i >= 0; i--) {
      const em = this.embers[i];
      em.life -= dt;
      em.x += (em.vx + Math.sin(timeNow * 2 + em.seed) * 18 + mouse.dxs * 0.4) * dt;
      em.y += em.vy * dt;
      em.vy -= 8 * dt;
      if (em.life <= 0 || em.y < -10) this.embers.splice(i, 1);
    }

    if (this.signal > 0.5 && Math.random() < dt * 7) {
      blip(rand(900, 3200), 0.025, 'square', 0.035);
    }
  },

  draw(a) {
    const px = this.fireImage.data;
    const { heat, palette } = this;
    for (let i = 0; i < heat.length; i++) {
      const h = heat[i];
      const o = i * 4;
      if (h === 0) { px[o + 3] = 0; continue; }
      const c = palette[h];
      px[o] = c[0]; px[o + 1] = c[1]; px[o + 2] = c[2];
      px[o + 3] = Math.min(255, h * 34);
    }
    this.fireCtx.putImageData(this.fireImage, 0, 0);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(this.fireCanvas, 0, 0, W, H + this.scale * 2);
    ctx.globalCompositeOperation = 'lighter';
    for (const sp of this.sparks) {
      ctx.fillStyle = 'rgba(255,210,110,' + (clamp(sp.life, 0, 1) * a).toFixed(3) + ')';
      ctx.fillRect(sp.x, sp.y, 2.5, 2.5);
    }
    if (this.embers) {
      for (const em of this.embers) {
        const flickr = 0.5 + 0.5 * Math.sin(timeNow * 11 + em.seed * 5);
        ctx.fillStyle = 'rgba(255,' + (140 + flickr * 80 | 0) + ',60,' + (clamp(em.life * 0.5, 0, 0.85) * a).toFixed(3) + ')';
        ctx.fillRect(em.x, em.y, 2, 2);
      }
    }
    ctx.restore();
  },
};

const GLIDER_GUN = [
  [24,0],[22,1],[24,1],[12,2],[13,2],[20,2],[21,2],[34,2],[35,2],
  [11,3],[15,3],[20,3],[21,3],[34,3],[35,3],[0,4],[1,4],[10,4],[16,4],[20,4],[21,4],
  [0,5],[1,5],[10,5],[14,5],[16,5],[17,5],[22,5],[24,5],[10,6],[16,6],[24,6],
  [11,7],[15,7],[12,8],[13,8],
];
const stationBloom = {
  id: 'bloom', f: 91.7, name: 'BLOOM', sub: 'a garden playing itself',
  hint: 'paint with your cursor. [g] glider gun. [r] reseed.',
  audioLevel: 0.07,
  voices: [
    { type: 'sine', f: 220, cut: 1200, lvl: 0.30 },
    { type: 'sine', f: 261.6, cut: 1200, lvl: 0.24 },
    { type: 'sine', f: 329.6, cut: 1200, lvl: 0.20 },
    { type: 'triangle', f: 110, cut: 600, lvl: 0.25 },
  ],
  signal: 0, cell: 10, cols: 0, rows: 0,
  grid: null, next: null, age: null, energy: null,
  stepTimer: 0, lifeCanvas: null, lifeCtx: null, lifeImage: null,

  resize() {
    this.cols = Math.ceil(W / this.cell);
    this.rows = Math.ceil(H / this.cell);
    const n = this.cols * this.rows;
    this.grid = new Uint8Array(n);
    this.next = new Uint8Array(n);
    this.age = new Uint16Array(n);
    this.energy = new Float32Array(n);
    this.reseed();
    this.lifeCanvas = document.createElement('canvas');
    this.lifeCanvas.width = this.cols; this.lifeCanvas.height = this.rows;
    this.lifeCtx = this.lifeCanvas.getContext('2d');
    this.lifeImage = this.lifeCtx.createImageData(this.cols, this.rows);
  },

  reseed() {
    for (let i = 0; i < this.grid.length; i++) {
      this.grid[i] = Math.random() < 0.10 ? 1 : 0;
      this.age[i] = 0;
    }
  },

  gliderGun(x, y) {
    const cx = (x / this.cell) | 0, cy = (y / this.cell) | 0;
    for (const [ox, oy] of GLIDER_GUN) {
      const gx = (cx + ox + this.cols) % this.cols;
      const gy = (cy + oy + this.rows) % this.rows;
      this.grid[gy * this.cols + gx] = 1;
    }
    blip(660, 0.15, 'triangle', 0.08);
  },

  paint(x, y) {
    const cx = (x / this.cell) | 0, cy = (y / this.cell) | 0;
    for (let oy = -2; oy <= 2; oy++) {
      for (let ox = -2; ox <= 2; ox++) {
        if (Math.random() < 0.55) {
          const gx = (cx + ox + this.cols) % this.cols;
          const gy = (cy + oy + this.rows) % this.rows;
          this.grid[gy * this.cols + gx] = 1;
        }
      }
    }
  },

  onClick(x, y) { this.paint(x, y); blip(rand(400, 700), 0.07, 'sine', 0.05); },

  step() {
    const { cols, rows, grid, next, age } = this;
    for (let y = 0; y < rows; y++) {
      const ym = ((y - 1 + rows) % rows) * cols;
      const y0 = y * cols;
      const yp = ((y + 1) % rows) * cols;
      for (let x = 0; x < cols; x++) {
        const xm = (x - 1 + cols) % cols;
        const xp = (x + 1) % cols;
        const n =
          grid[ym + xm] + grid[ym + x] + grid[ym + xp] +
          grid[y0 + xm] + grid[y0 + xp] +
          grid[yp + xm] + grid[yp + x] + grid[yp + xp];
        const i = y0 + x;
        const alive = grid[i] ? (n === 2 || n === 3) : (n === 3);
        next[i] = alive ? 1 : 0;
        age[i] = alive ? Math.min(age[i] + 1, 600) : 0;
      }
    }
    this.grid = next;
    this.next = grid;
  },

  update(dt) {
    if (mouse.down && !dialZone(mouse.y)) this.paint(mouse.x, mouse.y);
    this.stepTimer += dt;
    if (this.stepTimer > 0.085) {
      this.stepTimer = 0;
      this.step();
    }
    const decay = Math.pow(0.25, dt);
    const { grid, energy } = this;
    for (let i = 0; i < energy.length; i++) {
      energy[i] = grid[i] ? 1 : energy[i] * decay;
    }
  },

  draw(a) {
    const px = this.lifeImage.data;
    const { energy, age } = this;
    for (let i = 0; i < energy.length; i++) {
      const e = energy[i];
      const o = i * 4;
      if (e < 0.02) { px[o + 3] = 0; continue; }
      const hue = (140 + Math.min(age[i], 120) * 1.8) % 360;
      const c = hue / 60 | 0;
      const f = hue / 60 - c;
      const v = 255, p = 64, q = (255 - (255 - 64) * f) | 0, t = (64 + (255 - 64) * f) | 0;
      let r, g, b;
      switch (c % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        default: r = v; g = p; b = q; break;
      }
      px[o] = r; px[o + 1] = g; px[o + 2] = b;
      px[o + 3] = (e * 235) | 0;
    }
    this.lifeCtx.putImageData(this.lifeImage, 0, 0);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(this.lifeCanvas, 0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = a * 0.35;
    ctx.drawImage(this.lifeCanvas, -2, -2, W + 4, H + 4);
    ctx.restore();
  },
};

// ------------------------------------------------ 93.3 SWARM (evolving creatures)
const stationSwarm = {
  id: 'swarm', f: 93.3, name: 'SWARM', sub: 'they learn how you move',

  audioLevel: 0.07,
  voices: [

  ],
  signal: 0, creatures: [], pellets: [], temperament: 0, evolveTimer: 7,

  makeCreature(genes, x, y) {
    return {
      x: x !== undefined ? x : rand(0, W),
      y: y !== undefined ? y : rand(0, H),
      vx: rand(-30, 30), vy: rand(-30, 30),
      genes: genes || {
        hue: rand(0, 360), size: rand(2, 5), tailLen: (rand(7, 24)) | 0,
        maxSpeed: rand(50, 240), twitch: rand(0, 0.9),
      },
      tail: [], avgDist: 600,
    };
  },

  mutate(genes) {
    return {
      hue: (genes.hue + rand(-30, 30) + 360) % 360,
      size: clamp(genes.size + rand(-0.6, 0.6), 1.5, 7),
      tailLen: clamp((genes.tailLen + rand(-4, 4)) | 0, 4, 30),
      maxSpeed: clamp(genes.maxSpeed + rand(-40, 40), 30, 320),
      twitch: clamp(genes.twitch + rand(-0.2, 0.2), 0, 1.4),
    };
  },

  resize() {
    this.creatures = [];
    for (let i = 0; i < 55; i++) this.creatures.push(this.makeCreature());
    this.pellets = [];
  },

  onClick(x, y) {
    if (this.pellets.length >= 6) this.pellets.shift();
    this.pellets.push({ x, y, r: 5 });
    blip(rand(500, 640), 0.1, 'sine', 0.06);
  },

  update(dt) {
    this.temperament = lerp(this.temperament, mouse.speed, Math.min(1, dt * 0.5));
    const calm = this.temperament < 260;
    const cs = this.creatures;

    for (const c of cs) {
      let ax = 0, ay = 0;
      let nx = 0, ny = 0, nvx = 0, nvy = 0, count = 0;
      for (const o of cs) {
        if (o === c) continue;
        const d2 = dist2(c.x, c.y, o.x, o.y);
        if (d2 < 90 * 90) {
          count++;
          nx += o.x; ny += o.y; nvx += o.vx; nvy += o.vy;
          if (d2 < 26 * 26) {
            const d = Math.sqrt(d2) + 0.1;
            ax += (c.x - o.x) / d * 80;
            ay += (c.y - o.y) / d * 80;
          }
        }
      }
      if (count) {
        ax += ((nx / count) - c.x) * 0.6;
        ay += ((ny / count) - c.y) * 0.6;
        ax += ((nvx / count) - c.vx) * 0.8;
        ay += ((nvy / count) - c.vy) * 0.8;
      }

      const md = Math.sqrt(dist2(c.x, c.y, mouse.x, mouse.y));
      c.avgDist = lerp(c.avgDist, md, Math.min(1, dt * 0.8));
      if (md < 260) {
        const dirX = (mouse.x - c.x) / (md + 1), dirY = (mouse.y - c.y) / (md + 1);
        if (calm) { ax += dirX * 60; ay += dirY * 60; }
        else { ax -= dirX * 220; ay -= dirY * 220; }
      }

      let nearest = null, nd = 300 * 300;
      for (const p of this.pellets) {
        const d2 = dist2(c.x, c.y, p.x, p.y);
        if (d2 < nd) { nd = d2; nearest = p; }
      }
      if (nearest) {
        const d = Math.sqrt(nd) + 1;
        ax += (nearest.x - c.x) / d * 320;
        ay += (nearest.y - c.y) / d * 320;
        if (d < 12) {
          nearest.r = 0;
          c.genes.size = clamp(c.genes.size + 0.3, 1.5, 8);
          if (cs.length < 90) cs.push(this.makeCreature(this.mutate(c.genes), c.x + rand(-10, 10), c.y + rand(-10, 10)));
          blip(rand(700, 900), 0.08, 'triangle', 0.06);
        }
      }

      ax += rand(-1, 1) * c.genes.twitch * 600;
      ay += rand(-1, 1) * c.genes.twitch * 600;

      c.vx += ax * dt;
      c.vy += ay * dt;
      const sp = Math.hypot(c.vx, c.vy);
      if (sp > c.genes.maxSpeed) {
        c.vx *= c.genes.maxSpeed / sp;
        c.vy *= c.genes.maxSpeed / sp;
      }
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx); }
      if (c.x > W) { c.x = W; c.vx = -Math.abs(c.vx); }
      if (c.y < 0) { c.y = 0; c.vy = Math.abs(c.vy); }
      if (c.y > H - 100) { c.y = H - 100; c.vy = -Math.abs(c.vy); }

      c.tail.unshift({ x: c.x, y: c.y });
      if (c.tail.length > c.genes.tailLen) c.tail.length = c.genes.tailLen;
    }

    this.pellets = this.pellets.filter(p => p.r > 0);

    this.evolveTimer -= dt;
    if (this.evolveTimer <= 0 && cs.length > 8) {
      this.evolveTimer = rand(5, 9);
      const fitness = c => calm ? -c.avgDist : c.avgDist;
      let best = cs[0], worst = cs[0];
      for (const c of cs) {
        if (fitness(c) > fitness(best)) best = c;
        if (fitness(c) < fitness(worst)) worst = c;
      }
      const idx = cs.indexOf(worst);
      if (idx >= 0) cs[idx] = this.makeCreature(this.mutate(best.genes), best.x + rand(-20, 20), best.y + rand(-20, 20));
    }
  },

  draw(a) {
    ctx.save();
    ctx.globalAlpha = a;
    const calm = this.temperament < 260;
    ctx.font = '17px "VT323", monospace';
    ctx.fillStyle = 'rgba(140,200,170,' + (0.45 * a) + ')';
    ctx.fillText(calm ? 'the swarm is calm.' : 'the swarm is afraid of you.', 28, 128);

    for (const p of this.pellets) {

    for (const c of this.creatures) {

      // tapered luminous body along the tail, with a fainter wide aura
      for (let i = 0; i < c.tail.length - 1; i++) {
        const k = 1 - i / c.tail.length;
        const wave = Math.sin(timeNow * 8 + i * 0.9) * g.size * 0.35 * (1 - k);
        const px1 = c.tail[i].x, py1 = c.tail[i].y + wave;
        const px2 = c.tail[i + 1].x, py2 = c.tail[i + 1].y + wave;

        ctx.lineWidth = g.size * k * 2.6;
        ctx.beginPath();
        ctx.moveTo(px1, py1);
        ctx.lineTo(px2, py2);
        ctx.stroke();
        ctx.strokeStyle = 'hsla(' + g.hue.toFixed(0) + ',85%,65%,' + (k * 0.6 * a).toFixed(3) + ')';
        ctx.lineWidth = Math.max(0.6, g.size * k);
        ctx.beginPath();
        ctx.moveTo(px1, py1);
        ctx.lineTo(px2, py2);
        ctx.stroke();
      }
      // glowing head with eye
      const sp = Math.hypot(c.vx, c.vy) + 0.001;
      const hx = c.vx / sp, hy = c.vy / sp;
      ctx.shadowColor = 'hsla(' + g.hue.toFixed(0) + ',90%,70%,0.9)';
      ctx.shadowBlur = 9;
      ctx.fillStyle = 'hsla(' + g.hue.toFixed(0) + ',90%,72%,' + (0.95 * a) + ')';
      ctx.beginPath();
      ctx.arc(c.x, c.y, g.size, 0, TAU);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,' + (0.9 * a) + ')';
      ctx.beginPath();
      ctx.arc(c.x + hx * g.size * 0.45, c.y + hy * g.size * 0.45, Math.max(0.8, g.size * 0.30), 0, TAU);
      ctx.fill();
      ctx.fillStyle = 'rgba(10,10,20,' + (0.9 * a) + ')';
      ctx.beginPath();
      ctx.arc(c.x + hx * g.size * 0.55, c.y + hy * g.size * 0.55, Math.max(0.4, g.size * 0.14), 0, TAU);
      ctx.fill();
    }
    ctx.restore();
  },
};

    for (let i = 0; i < this.wells.length; i++) {

        }

      p.vx *= Math.pow(0.75, dt);
      p.vy *= Math.pow(0.75, dt);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.x < -60 || p.x > W + 60 || p.y < -60 || p.y > H + 60) {
        this.particles[i] = this.wells.length ? this.spawnEdge() : this.spawn();
      }
    }
  },

  draw(a) {
    const tc = this.trailCtx;
    tc.fillStyle = 'rgba(2,0,8,0.16)';
    tc.fillRect(0, 0, W, H);
    for (const p of this.particles) {
      const speed = Math.hypot(p.vx, p.vy);
      const k = clamp(speed / 700, 0, 1);
      const hue = 225 + k * 110;
      const light = 45 + k * 45;
      tc.fillStyle = 'hsl(' + hue.toFixed(0) + ',90%,' + light.toFixed(0) + '%)';
      tc.fillRect(p.x, p.y, 2, 2);
    }
    for (const w of this.wells) {
      const fade = clamp(1 - (w.age / w.life - 0.8) * 5, 0, 1);
      const radius = 8 + w.m * 2;
      const grad = tc.createRadialGradient(w.x, w.y, 0, w.x, w.y, radius * 6);
      grad.addColorStop(0, 'rgba(0,0,0,1)');
      grad.addColorStop(0.4, 'rgba(80,20,140,' + (0.5 * fade) + ')');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      tc.fillStyle = grad;
      tc.beginPath();
      tc.arc(w.x, w.y, radius * 6, 0, TAU);
      tc.fill();

      // accretion disk: tilted rotating ellipse, hot inner edge
      tc.save();
      tc.translate(w.x, w.y);
      tc.rotate(0.5 + Math.sin(w.eaten * 0.1) * 0.2);
      const spin = timeNow * (2.2 + w.m * 0.3);
      for (let ring = 0; ring < 3; ring++) {
        const rr = radius * (1.7 + ring * 0.85);
        const heat = 1 - ring * 0.3;
        tc.strokeStyle = 'hsla(' + (280 + ring * 25) + ',90%,' + (62 - ring * 12) + '%,' + (0.5 * heat * fade) + ')';
        tc.lineWidth = 2.4 - ring * 0.6;
        tc.beginPath();
        tc.ellipse(0, 0, rr, rr * 0.32, 0, spin + ring * 1.9, spin + ring * 1.9 + 4.4);
        tc.stroke();
      }
      tc.restore();

      // photon ring: thin, perfectly circular, too bright
      tc.strokeStyle = 'rgba(255,240,255,' + (0.85 * fade) + ')';
      tc.lineWidth = 1.2;
      tc.beginPath();
      tc.arc(w.x, w.y, radius * 1.18, 0, TAU);
      tc.stroke();
      tc.strokeStyle = 'rgba(255,180,255,' + (0.55 * fade) + ')';
      tc.lineWidth = 1.5;
      tc.beginPath();
      tc.arc(w.x, w.y, radius + Math.sin(timeNow * 5 + w.eaten) * 2, 0, TAU);
      tc.stroke();
    }
    for (const s of this.shocks) {
      tc.strokeStyle = 'rgba(220,200,255,' + clamp(1 - s.r / Math.max(W, H), 0, 1) * 0.7 + ')';
      tc.lineWidth = 2;
      tc.beginPath();
      tc.arc(s.x, s.y, s.r, 0, TAU);
      tc.stroke();
    }
    ctx.save();
    ctx.globalAlpha = a;
    for (const s of this.bgStars) {
      const tw = 0.4 + 0.6 * Math.sin(timeNow * 1.3 + s.tw);
      ctx.fillStyle = 'rgba(190,185,225,' + (tw * 0.5 * a).toFixed(3) + ')';
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.drawImage(this.trail, 0, 0);
    ctx.restore();
  },
};

const stationMirror = {
  id: 'mirror', f: 97.3, name: 'MIRROR', sub: 'it shows you seven seconds ago',
  hint: 'move. then watch who follows. they click when you clicked.',
  audioLevel: 0.08,
  voices: [

    { type: 'triangle', f: 77.8, cut: 300, lvl: 0.3 },
  ],
  signal: 0, buffer: [], pendingClick: false,
  trail: null, trailCtx: null, rings: [],
  deviating: 0, deviateTimer: 10, devX: 0, devY: 0,

  resize() {
    this.trail = document.createElement('canvas');
    this.trail.width = W; this.trail.height = H;
    this.trailCtx = this.trail.getContext('2d');
    this.buffer = [];
    this.rings = [];
  },

  onClick(x, y) {
    this.pendingClick = true;
    this.rings.push({ x, y, r: 0, hue: 160 });
    blip(740, 0.18, 'sine', 0.07, 380);
  },

  sample(delay) {
    const target = timeNow - delay;
    const buf = this.buffer;
    for (let i = buf.length - 1; i >= 1; i--) {
      if (buf[i - 1].t <= target && buf[i].t >= target) {
        const a = buf[i - 1], b = buf[i];
        const k = (target - a.t) / Math.max(0.0001, b.t - a.t);
        return { x: lerp(a.x, b.x, k), y: lerp(a.y, b.y, k), click: b.click && k > 0.5 && !b.consumed ? b : null };
      }
    }
    return null;
  },

  update(dt) {
    this.buffer.push({ x: mouse.x, y: mouse.y, t: timeNow, click: this.pendingClick, consumed: false });
    this.pendingClick = false;
    while (this.buffer.length && this.buffer[0].t < timeNow - 14) this.buffer.shift();

    this.deviateTimer -= dt;
    if (this.deviateTimer <= 0) {
      this.deviateTimer = rand(9, 22);
      if (Math.random() < 0.4) {
        this.deviating = 1.9;
        this.devX = rand(0, 1000);
        this.devY = rand(0, 1000);
        blip(207, 0.8, 'sine', 0.08, 311);
      }
    }
    if (this.deviating > 0) this.deviating -= dt;

    for (let i = this.rings.length - 1; i >= 0; i--) {
      this.rings[i].r += 500 * dt;
      if (this.rings[i].r > 400) this.rings.splice(i, 1);
    }

    for (const delay of [3, 7]) {
      const target = timeNow - delay;
      const key = 'replayedUntil' + delay;
      const prev = this[key] === undefined ? target : this[key];
      for (const e of this.buffer) {
        if (e.t > prev && e.t <= target && e.click) {
          this.rings.push({ x: e.x, y: e.y, r: 0, hue: delay === 3 ? 280 : 0 });
          blip(delay === 3 ? 560 : 420, 0.2, 'sine', 0.05, 240);
        }
      }
      this[key] = target;
    }
  },

  drawPhantom(tc, x, y, hue, alpha) {
    const jx = rand(-1.5, 1.5), jy = rand(-1.5, 1.5);
    tc.shadowColor = 'hsla(' + hue + ',85%,65%,0.9)';
    tc.shadowBlur = 12;
    tc.strokeStyle = 'hsla(' + hue + ',80%,65%,' + alpha + ')';
    tc.lineWidth = 1.5;
    tc.beginPath();
    tc.arc(x + jx, y + jy, 8, 0, TAU);
    tc.stroke();
    tc.shadowBlur = 0;
    tc.fillStyle = 'hsla(' + hue + ',80%,75%,' + alpha + ')';
    tc.fillRect(x + jx - 1, y + jy - 1, 2, 2);
    tc.strokeStyle = 'hsla(' + ((hue + 120) % 360) + ',80%,65%,' + (alpha * 0.4) + ')';
    tc.beginPath();
    tc.arc(x - jx, y - jy, 8, 0, TAU);
    tc.stroke();
  },

  update7Pos() {
    if (this.deviating > 0) {
      const k = timeNow * 1.7;
      return {
        x: W / 2 + Math.sin(k + this.devX) * W * 0.3,
        y: H / 2 + Math.cos(k * 1.31 + this.devY) * H * 0.3,
      };
    }
    return this.sample(7);
  },

  draw(a) {
    const tc = this.trailCtx;
    tc.fillStyle = 'rgba(0,4,6,0.10)';
    tc.fillRect(0, 0, W, H);

    tc.fillStyle = 'rgba(120,255,220,0.9)';
    tc.fillRect(mouse.x - 1, mouse.y - 1, 2, 2);

    const p3 = this.sample(3);
    if (p3) this.drawPhantom(tc, p3.x, p3.y, 280, 0.7);
    const p7 = this.update7Pos();
    if (p7) this.drawPhantom(tc, p7.x, p7.y, this.deviating > 0 ? 0 : 180, 0.55);

    for (const ring of this.rings) {
      tc.strokeStyle = 'hsla(' + ring.hue + ',80%,70%,' + clamp(1 - ring.r / 400, 0, 1) * 0.6 + ')';
      tc.lineWidth = 1.5;
      tc.beginPath();
      tc.arc(ring.x, ring.y, ring.r, 0, TAU);
      tc.stroke();
    }

    ctx.save();
    ctx.globalAlpha = a;
    // echo chamber: slow concentric rings breathing outward from the center
    const maxR = Math.hypot(W, H) * 0.55;
    for (let ring = 0; ring < 6; ring++) {
      const rr = ((timeNow * 26 + ring * maxR / 6) % maxR);
      const fade = (1 - rr / maxR) * 0.10;
      ctx.strokeStyle = 'rgba(90,200,190,' + (fade * a).toFixed(3) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, rr, 0, TAU);
      ctx.stroke();
    }
    ctx.drawImage(this.trail, 0, 0);
    if (this.deviating > 0) {
      ctx.font = '19px "VT323", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,120,120,' + (0.5 * a) + ')';
      ctx.fillText('that one is not yours.', W / 2, H * 0.2);
      ctx.textAlign = 'left';
    }
    ctx.restore();
  },
};

  composeSentence() {

  },

  enqueue(text, correction) {
    this.queue.push({ nl: true });
    for (const ch of text) this.queue.push(ch);
    if (correction && Math.random() < 0.18) {
      const wrong = pick([' wait.', ' no.', ' that is wrong.']);
      for (let i = 0; i < text.split(' ').pop().length + 1; i++) this.queue.push({ bs: true });
      for (const ch of wrong) this.queue.push(ch);
    }

  onKey(key) {
    const last = this.lines[this.lines.length - 1];
    if (key === 'Backspace') {
      if (last.who === 'user' && last.text.length) last.text = last.text.slice(0, -1);
      this.userTypedAt = timeNow;
      return;
    }
    if (key === 'Enter') {
      if (last.who === 'user' && last.text.trim()) this.prepareReply(last.text);
      this.lines.push({ who: 'user', text: '' });
      this.userTypedAt = timeNow;
      return;
    }
    if (last.who !== 'user') this.lines.push({ who: 'user', text: '' });
    const line = this.lines[this.lines.length - 1];
    line.text += key;
    blip(rand(1700, 2300), 0.018, 'square', 0.02);
    if (line.text.length > this.maxChars()) this.lines.push({ who: 'user', text: '' });
    this.userTypedAt = timeNow;

  prepareReply(userText) {
    for (const [re, reply] of GHOST_TRIGGERS) {
      if (re.test(userText)) { this.pendingReply = reply; return; }
    }
    this.pendingReply = pick(GHOST_REPLIES);

  update(dt) {
    const sinceUser = timeNow - this.userTypedAt;
    const userLine = this.lines[this.lines.length - 1];
    if (userLine.who === 'user' && userLine.text.trim() && sinceUser > 2.0 && !this.pendingReply) {
      this.prepareReply(userLine.text);
    }
    if (sinceUser < 1.6) return;
    if (timeNow < this.pauseUntil) return;

    if (this.queue.length === 0) {
      if (this.pendingReply) {
        this.enqueue(this.pendingReply, false);
        this.pendingReply = null;
      } else {
        this.enqueue(this.composeSentence(), true);
      }
    }

    this.typeTimer -= dt;
    if (this.typeTimer > 0) return;
    this.typeTimer = rand(0.03, 0.10);

    const token = this.queue.shift();
    if (typeof token === 'string') {
      let last = this.lines[this.lines.length - 1];
      if (last.who !== 'ghost') { this.lines.push({ who: 'ghost', text: '' }); last = this.lines[this.lines.length - 1]; }

      if (token !== ' ' && this.signal > 0.35) blip(rand(1100, 1500), 0.012, 'square', 0.012);

    } else if (token.nl) {
      this.lines.push({ who: 'ghost', text: '' });
    } else if (token.bs) {
      const last = this.lines[this.lines.length - 1];
      if (last.text.length) last.text = last.text.slice(0, -1);
      this.typeTimer = 0.09;
    } else if (token.pause) {
      this.pauseUntil = timeNow + token.pause;
    }
    if (this.lines.length > 30) this.lines.splice(0, this.lines.length - 30);
  },

  draw(a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.font = '24px "VT323", monospace';
    ctx.textBaseline = 'alphabetic';
    const lineHeight = 30;
    const baseX = Math.max(40, W * 0.11);
    let y = H - 150;
    const visible = Math.min(this.lines.length, ((H - 200) / lineHeight) | 0);
    for (let i = this.lines.length - 1; i >= this.lines.length - visible; i--) {
      const line = this.lines[i];
      const fade = 1 - (this.lines.length - 1 - i) / visible;
      const newest = i >= this.lines.length - 2;
      ctx.shadowColor = line.who === 'user' ? 'rgba(255,180,80,0.8)' : 'rgba(120,255,170,0.8)';
      ctx.shadowBlur = newest ? 7 : 0;
      let x = baseX;
      for (let c = 0; c < line.text.length; c++) {
        const charX = x + c * 11;
        const d2m = dist2(charX, y, mouse.x, mouse.y);
        let jx = 0, jy = 0;
        if (d2m < 110 * 110) {
          const k = 1 - Math.sqrt(d2m) / 110;
          jx = rand(-4, 4) * k;
          jy = rand(-4, 4) * k;
        }
        ctx.fillStyle = line.who === 'user'
          ? 'rgba(255,190,90,' + (0.95 * fade * a) + ')'
          : 'rgba(170,255,190,' + (0.85 * fade * a) + ')';
        ctx.fillText(line.text[c], charX + jx, y + jy);
      }
      if (i === this.lines.length - 1 && Math.floor(timeNow * 2.4) % 2 === 0) {
        ctx.fillStyle = 'rgba(220,255,230,' + (0.9 * a) + ')';
        ctx.fillRect(x + line.text.length * 11 + 2, y - 18, 11, 22);
      }
      ctx.shadowBlur = 0;
      y -= lineHeight;
      if (y < 90) break;
    }
    ctx.restore();
  },
};

      const spin = timeNow * (ring === 0 ? 0.1 : -0.06);
      ctx.strokeStyle = 'rgba(100,170,120,' + (0.16 * a) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, rr, 0, TAU);
      ctx.stroke();
      for (let tick = 0; tick < 36; tick++) {
        const ang = spin + tick * TAU / 36;
        const long = tick % 6 === 0;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang) * rr, Math.sin(ang) * rr);
        ctx.lineTo(Math.cos(ang) * (rr - (long ? 12 : 6)), Math.sin(ang) * (rr - (long ? 12 : 6)));
        ctx.stroke();
      }
    }
    ctx.restore();

    const allFound = visibleFoundCount() === totalVisible();
    const special = this.group === '100.0';
    ctx.textAlign = 'center';
    ctx.font = Math.round(Math.min(140, W / 8)) + 'px "VT323", monospace';
    const shown = this.group.slice(0, this.revealed);
    ctx.fillStyle = special ? 'rgba(255,215,130,' + (0.95 * a) + ')' : 'rgba(190,255,205,' + (0.9 * a) + ')';
    ctx.shadowColor = special ? 'rgba(255,200,80,0.8)' : 'rgba(80,255,140,0.6)';
    ctx.shadowBlur = 26;
    ctx.fillText(shown.split('').join(' '), W / 2, H * 0.44);
    ctx.shadowBlur = 0;

    ctx.font = '24px "VT323", monospace';
    for (let i = 0; i < this.history.length; i++) {
      ctx.fillStyle = 'rgba(140,200,160,' + ((0.4 - i * 0.06) * a) + ')';
      ctx.fillText(this.history[i].split('').join(' '), W / 2, H * 0.44 - 110 - i * 32);
    }

    if (allFound && !seenBroadcast) {
      ctx.font = '20px "VT323", monospace';
      ctx.fillStyle = 'rgba(255,215,130,' + ((0.5 + 0.3 * Math.sin(timeNow * 2)) * a) + ')';
      ctx.fillText('the numbers have changed.', W / 2, H * 0.58);
    }

    const scopeY = H * 0.7;
    ctx.strokeStyle = 'rgba(120,255,170,' + (0.5 * a) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = W * 0.25; x <= W * 0.75; x += 4) {
      const k = (x - W * 0.25) / (W * 0.5);
      const env = Math.sin(k * Math.PI);
      const yy = scopeY + Math.sin(x * 0.09 + timeNow * 20) * 26 * env * this.scopePulse + Math.sin(x * 0.013 + timeNow * 2) * 4 * env;
      if (x === W * 0.25) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
    }
    ctx.stroke();
    ctx.textAlign = 'left';
    ctx.restore();
  },
};

// ------------------------------------------------ 103.9 FIRMAMENT (constellations)
const CONST_A = ['VESPER', 'HOLLOW', 'PALE', 'SILENT', 'DROWNED', 'IRON', 'LAST', 'WANDERING', 'BROKEN', 'SLEEPING'];
const CONST_B = ['CROWN', 'SERPENT', 'ANTLER', 'LANTERN', 'ORPHAN', 'VEIL', 'HARP', 'KEY', 'HOUND', 'ANCHOR'];

const stationSky = {
  id: 'sky', f: 103.9, name: 'FIRMAMENT', sub: 'the sky is unfinished',
  hint: 'click to place stars. four nearby become a constellation. [c] clears.',
  audioLevel: 0.06,
  voices: [
    { type: 'triangle', f: 523.25, cut: 2400, lvl: 0.10 },
    { type: 'triangle', f: 659.25, cut: 2400, lvl: 0.08 },
    { type: 'triangle', f: 784, cut: 2400, lvl: 0.06 },
    { type: 'sine', f: 130.8, cut: 500, lvl: 0.22 },
  ],
  signal: 0, bgStars: [], userStars: [], names: [], shooting: null, shootTimer: 5, goldFlash: 0,

  resize() {
    const STAR_TINTS = ['205,215,255', '255,240,220', '255,250,245', '255,222,210', '230,235,255'];
    this.bgStars = [];
    for (let i = 0; i < 340; i++) {
      this.bgStars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: rand(0.4, 1.7), tw: rand(0, TAU), depth: rand(0.3, 1),
        tint: pick(STAR_TINTS),
      });
    }
    // the milky way: a dense diagonal river of faint stars
    this.mwStars = [];
    const mwAngle = -0.42;
    const cosA = Math.cos(mwAngle), sinA = Math.sin(mwAngle);
    for (let i = 0; i < 520; i++) {
      const along = rand(-0.75, 0.75) * Math.max(W, H) * 1.5;
      const spread = (rand(-1, 1) + rand(-1, 1) + rand(-1, 1)) / 3 * H * 0.16;
      this.mwStars.push({
        x: W / 2 + along * cosA - spread * sinA,
        y: H * 0.45 + along * sinA + spread * cosA,
        r: rand(0.3, 1.1), tw: rand(0, TAU),
        tint: pick(STAR_TINTS),
      });
    }
    this.mwAngle = mwAngle;
  },

  clearSky() { this.userStars = []; this.names = []; },

  onClick(x, y) {
    if (this.userStars.length >= 110) this.userStars.shift();
    this.userStars.push({ x, y, born: timeNow });
    blip(rand(1100, 1500), 0.3, 'sine', 0.05);
    this.findConstellations();
  },

  findConstellations() {
    const stars = this.userStars;
    const parent = stars.map((_, i) => i);
    const find = i => { while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; } return i; };
    for (let i = 0; i < stars.length; i++) {
      for (let j = i + 1; j < stars.length; j++) {
        if (dist2(stars[i].x, stars[i].y, stars[j].x, stars[j].y) < 170 * 170) {
          parent[find(i)] = find(j);
        }
      }
    }
    const clusters = {};
    stars.forEach((s, i) => {
      const root = find(i);
      (clusters[root] = clusters[root] || []).push(s);
    });
    for (const root in clusters) {
      const cluster = clusters[root];
      if (cluster.length < 4) continue;
      const cx = cluster.reduce((a, s) => a + s.x, 0) / cluster.length;
      const cy = cluster.reduce((a, s) => a + s.y, 0) / cluster.length;
      const near = this.names.find(n => dist2(n.x, n.y, cx, cy) < 220 * 220);
      if (near) { near.x = cx; near.y = cy; near.count = cluster.length; continue; }
      this.names.push({ x: cx, y: cy, text: 'THE ' + pick(CONST_A) + ' ' + pick(CONST_B), born: timeNow, count: cluster.length });
      this.goldFlash = 1;
      blipAt(0, 1046, 0.3, 'triangle', 0.07);
      blipAt(0.12, 1318, 0.5, 'triangle', 0.07);
    }
  },

  update(dt) {
    this.goldFlash = Math.max(0, this.goldFlash - dt * 0.5);
    this.shootTimer -= dt;
    if (this.shootTimer < 0 && !this.shooting) {
      this.shooting = { x: rand(W * 0.2, W * 0.9), y: rand(0, H * 0.3), vx: rand(-900, -500), vy: rand(200, 420), t: 0 };
      this.shootTimer = rand(6, 15);
    }
    if (this.shooting) {
      this.shooting.t += dt;
      this.shooting.x += this.shooting.vx * dt;
      this.shooting.y += this.shooting.vy * dt;
      if (this.shooting.t > 1.4 || this.shooting.x < -100) this.shooting = null;
    }
  },

  draw(a) {
    ctx.save();
    ctx.globalAlpha = a;
    const offX = (mouse.x - W / 2) * -0.012;
    const offY = (mouse.y - H / 2) * -0.012;
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(4,6,26,' + a + ')');
    grad.addColorStop(1, 'rgba(10,4,24,' + a + ')');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    for (let band = 0; band < 2; band++) {
      ctx.beginPath();
      const baseY = 70 + band * 46;
      for (let x = 0; x <= W; x += 14) {
        const yy = baseY + Math.sin(x * 0.004 + timeNow * 0.25 + band * 2.2) * 38 + Math.sin(x * 0.011 - timeNow * 0.13) * 16;
        if (x === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
      }
      const hue = 120 + 40 * Math.sin(timeNow * 0.1 + band);
      ctx.strokeStyle = 'hsla(' + hue.toFixed(0) + ',70%,60%,' + (0.10 * a) + ')';
      ctx.lineWidth = 26;
      ctx.stroke();
    }

    // milky way glow band
    ctx.save();
    ctx.translate(W / 2 + offX * 0.4, H * 0.45 + offY * 0.4);
    ctx.rotate(this.mwAngle);
    const mw = ctx.createLinearGradient(0, -H * 0.2, 0, H * 0.2);
    mw.addColorStop(0, 'rgba(120,130,180,0)');
    mw.addColorStop(0.42, 'rgba(150,150,200,' + (0.07 * a) + ')');
    mw.addColorStop(0.5, 'rgba(190,180,210,' + (0.11 * a) + ')');
    mw.addColorStop(0.58, 'rgba(150,150,200,' + (0.07 * a) + ')');
    mw.addColorStop(1, 'rgba(120,130,180,0)');
    ctx.fillStyle = mw;
    ctx.fillRect(-Math.max(W, H), -H * 0.2, Math.max(W, H) * 2, H * 0.4);
    ctx.restore();
    for (const s of this.mwStars) {
      const tw = 0.3 + 0.5 * Math.sin(timeNow * 1.2 + s.tw);
      ctx.fillStyle = 'rgba(' + s.tint + ',' + (tw * 0.55 * a).toFixed(3) + ')';
      ctx.fillRect(s.x + offX * 0.4, s.y + offY * 0.4, s.r, s.r);
    }

    for (const s of this.bgStars) {
      const tw = 0.45 + 0.55 * Math.sin(timeNow * 1.7 + s.tw);
      ctx.fillStyle = 'rgba(' + s.tint + ',' + (tw * 0.8 * a * s.depth).toFixed(3) + ')';
      ctx.fillRect(s.x + offX * s.depth, s.y + offY * s.depth, s.r, s.r);
      if (s.r > 1.4) {
        ctx.fillStyle = 'rgba(' + s.tint + ',' + (tw * 0.25 * a).toFixed(3) + ')';
        ctx.fillRect(s.x + offX * s.depth - 2, s.y + offY * s.depth, 5, 1);
        ctx.fillRect(s.x + offX * s.depth, s.y + offY * s.depth - 2, 1, 5);
      }
    }

    if (this.shooting) {
      const sh = this.shooting;
      const fade = 1 - sh.t / 1.4;
      ctx.strokeStyle = 'rgba(255,255,255,' + (fade * 0.9 * a) + ')';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(sh.x - sh.vx * 0.13, sh.y - sh.vy * 0.13);
      ctx.stroke();
    }

    const stars = this.userStars;
    ctx.lineWidth = 1;
    for (let i = 0; i < stars.length; i++) {
      for (let j = i + 1; j < stars.length; j++) {
        const d2 = dist2(stars[i].x, stars[i].y, stars[j].x, stars[j].y);
        if (d2 < 170 * 170) {
          const k = 1 - Math.sqrt(d2) / 170;
          if (this.goldFlash > 0) {
            ctx.strokeStyle = 'rgba(255,215,130,' + (k * (0.3 + this.goldFlash * 0.5) * a).toFixed(3) + ')';
          } else {
            ctx.strokeStyle = 'rgba(150,190,255,' + (k * 0.55 * a).toFixed(3) + ')';
          }
          ctx.beginPath();
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[j].x, stars[j].y);
          ctx.stroke();
        }
      }
    }
    for (const s of stars) {
      const pulse = 0.7 + 0.3 * Math.sin(timeNow * 2 + s.born * 7);
      const grow = clamp((timeNow - s.born) * 3, 0, 1);
      ctx.fillStyle = 'rgba(235,242,255,' + (pulse * a) + ')';
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2.4 * grow, 0, TAU);
      ctx.fill();
      ctx.fillStyle = 'rgba(160,200,255,' + (0.18 * pulse * a) + ')';
      ctx.beginPath();
      ctx.arc(s.x, s.y, 8 * grow, 0, TAU);
      ctx.fill();
    }
    ctx.font = '19px "VT323", monospace';
    ctx.textAlign = 'center';
    for (const n of this.names) {
      const reveal = clamp((timeNow - n.born) * 0.8, 0, 1);
      const shown = n.text.slice(0, Math.ceil(n.text.length * reveal));
      ctx.fillStyle = 'rgba(190,215,255,' + (0.85 * a) + ')';
      ctx.fillText(shown.split('').join(' '), n.x, n.y - 26);
    }
    ctx.textAlign = 'left';
    ctx.restore();
  },
};

// ------------------------------------------------ 105.3 UNDERTOW (deep sea)
const stationUndertow = {
  id: 'undertow', f: 105.3, name: 'UNDERTOW', sub: 'the sea never stopped singing',

  voices: [

  signal: 0, jellies: [], whales: [], pings: [],

  resize() {

  onClick(x, y) {

    blip(520, 0.7, 'sine', 0.14, 58);
  },

  update(dt) {
    for (const j of this.jellies) {
      j.phase += dt * 2;
      const pulse = Math.max(0, Math.sin(j.phase));
      j.vy -= pulse * 26 * dt + 4 * dt;
      const md = Math.sqrt(dist2(j.x, j.y, mouse.x, mouse.y));
      if (md < 280 && md > 30) {
        j.vx += (mouse.x - j.x) / md * 30 * dt;
        j.vy += (mouse.y - j.y) / md * 30 * dt;
      }
      j.vx += rand(-1, 1) * 8 * dt;
      j.vx *= Math.pow(0.5, dt);
      j.vy *= Math.pow(0.5, dt);
      j.x += j.vx * dt;
      j.y += j.vy * dt;
      if (j.y < -40) { j.y = H + 40; j.x = rand(0, W); }
      if (j.x < -40) j.x = W + 40;
      if (j.x > W + 40) j.x = -40;
    }

    for (const w of this.whales) {
      w.x += w.dir * w.speed * dt;
      if (w.x > W + w.size * 1.5) w.x = -w.size * 1.5;
      if (w.x < -w.size * 1.5) w.x = W + w.size * 1.5;
      w.reveal = Math.max(0, w.reveal - dt * 0.4);
    }

    for (let i = this.pings.length - 1; i >= 0; i--) {
      const p = this.pings[i];
      p.r += 430 * dt;
      for (const w of this.whales) {
        const d = Math.sqrt(dist2(p.x, p.y, w.x, w.y));
        if (Math.abs(d - p.r) < 46) {
          if (w.reveal < 0.5) blip(rand(140, 200), 1.6, 'sine', 0.12, rand(70, 110));

  draw(a) {

    grad.addColorStop(1, 'rgba(1,4,12,' + a + ')');
    ctx.fillStyle = grad;

    for (let layer = 0; layer < 3; layer++) {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const baseY = 36 + layer * 22;
      for (let x = 0; x <= W; x += 12) {
        ctx.lineTo(x, baseY + Math.sin(x * 0.011 + timeNow * (0.8 + layer * 0.3)) * 9 + Math.sin(x * 0.027 - timeNow * 0.9) * 5);

      ctx.lineTo(W, 0);

      rayGrad.addColorStop(0, 'rgba(120,200,240,' + (shine * a) + ')');
      rayGrad.addColorStop(1, 'rgba(120,200,240,0)');
      ctx.fillStyle = rayGrad;
      ctx.beginPath();
      ctx.moveTo(topX - width, 0);
      ctx.lineTo(topX + width, 0);
      ctx.lineTo(topX + tilt + width * 2.6, H);
      ctx.lineTo(topX + tilt - width * 2.6, H);
      ctx.closePath();
      ctx.fill();
    }

    // marine snow
    for (let i = 0; i < 110; i++) {
      const sx = ((i * 97.3) % W) + Math.sin(timeNow * 0.5 + i) * 14;
      const sy = ((i * 53.7) + timeNow * (6 + (i % 5) * 3.5)) % H;
      ctx.fillStyle = 'rgba(180,210,230,' + ((0.10 + (i % 3) * 0.05) * a) + ')';
      ctx.fillRect(sx, sy, 1.4, 1.4);
    }

    const light = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 240);
    light.addColorStop(0, 'rgba(140,210,255,' + (0.13 * a) + ')');
    light.addColorStop(1, 'rgba(140,210,255,0)');
    ctx.fillStyle = light;
    ctx.fillRect(mouse.x - 240, mouse.y - 240, 480, 480);

    for (const w of this.whales) {
      ctx.save();
      ctx.translate(w.x, w.y + Math.sin(timeNow * 0.4 + w.x * 0.01) * 10);
      ctx.scale(w.dir, 1);
      const body = () => {
        ctx.beginPath();
        ctx.ellipse(0, 0, w.size, w.size * 0.3, 0, 0, TAU);
        ctx.moveTo(-w.size * 0.92, 0);
        ctx.lineTo(-w.size * 1.28, -w.size * 0.26);
        ctx.lineTo(-w.size * 1.28, w.size * 0.26);
        ctx.closePath();
        ctx.moveTo(w.size * 0.28, w.size * 0.3);
        ctx.ellipse(w.size * 0.1, w.size * 0.26, w.size * 0.18, w.size * 0.07, -0.5, 0, TAU);
      };
      ctx.fillStyle = 'rgba(14,30,52,' + ((0.30 + w.reveal * 0.25) * a) + ')';
      body();
      ctx.fill();
      if (w.reveal > 0.02) {
        ctx.strokeStyle = 'rgba(150,230,255,' + (w.reveal * 0.75 * a) + ')';
        ctx.lineWidth = 1.6;
        ctx.shadowColor = 'rgba(120,220,255,' + (w.reveal * 0.8) + ')';
        ctx.shadowBlur = 14;
        body();
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }

    for (const p of this.pings) {
      const fade = clamp(1 - p.r / (Math.max(W, H) * 1.2), 0, 1);
      ctx.strokeStyle = 'rgba(120,230,255,' + (fade * 0.5 * a) + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, TAU);
      ctx.stroke();
    }

    ctx.globalCompositeOperation = 'lighter';
    for (const j of this.jellies) {
      const pulse = 1 + 0.25 * Math.sin(j.phase);
      const md = Math.sqrt(dist2(j.x, j.y, mouse.x, mouse.y));
      const glow = clamp(1 - md / 320, 0.25, 1);
      const bellR = j.size * pulse;
      ctx.fillStyle = 'hsla(' + j.hue.toFixed(0) + ',85%,65%,' + (0.30 * glow * a).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(j.x, j.y, bellR, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      // bright nucleus + radial gills inside the bell
      ctx.fillStyle = 'hsla(' + j.hue.toFixed(0) + ',95%,82%,' + (0.5 * glow * a).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(j.x, j.y - bellR * 0.35, bellR * 0.3, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = 'hsla(' + j.hue.toFixed(0) + ',90%,75%,' + (0.30 * glow * a).toFixed(3) + ')';
      ctx.lineWidth = 1;
      for (let gill = -2; gill <= 2; gill++) {
        ctx.beginPath();
        ctx.moveTo(j.x, j.y - bellR * 0.3);
        ctx.lineTo(j.x + gill * bellR * 0.32, j.y - 1);
        ctx.stroke();
      }
      ctx.strokeStyle = 'hsla(' + j.hue.toFixed(0) + ',85%,72%,' + (0.35 * glow * a).toFixed(3) + ')';
      ctx.lineWidth = 1.2;
      for (let t = 0; t < 5; t++) {
        const tx = j.x - bellR * 0.7 + t * bellR * 0.35;
        ctx.beginPath();
        ctx.moveTo(tx, j.y);
        for (let seg = 1; seg <= 5; seg++) {
          ctx.lineTo(tx + Math.sin(j.phase * 1.5 + t + seg) * 4 * seg * 0.4, j.y + seg * j.size * 0.4);
        }
        ctx.stroke();
      }
      const halo = ctx.createRadialGradient(j.x, j.y, 0, j.x, j.y, bellR * 3);
      halo.addColorStop(0, 'hsla(' + j.hue.toFixed(0) + ',85%,65%,' + (0.12 * glow * a) + ')');
      halo.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = halo;
      ctx.fillRect(j.x - bellR * 3, j.y - bellR * 3, bellR * 6, bellR * 6);
    }
    ctx.restore();
  },
};
